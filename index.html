<!DOCTYPE html>

<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bot Lab PRO</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
body{background:#03060e;color:#e2eeff;font-family:'IBM Plex Sans',sans-serif;margin:0}
.root{max-width:1100px;margin:auto;padding:10px}
.card{background:#07101f;border:1px solid #1a3060;border-radius:12px;padding:12px;margin-bottom:12px}
.title{font-weight:700;margin-bottom:6px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
canvas{width:100%!important;height:200px!important}
.green{color:#22c55e}
.red{color:#ef4444}
.small{font-size:12px;color:#4a6a9a}
</style>

</head>

<body>
<div class="root">

<div class="card">
<div class="title">⚗️ Bot Lab PRO</div>
<div id="upd" class="small"></div>
</div>

<div class="card grid" id="bots"></div>

<div class="card">
<div class="title">Balance Curves</div>
<canvas id="c_bal"></canvas>
</div>

<div class="card">
<div class="title">Cumulative PnL</div>
<canvas id="c_cpnl"></canvas>
</div>

<div class="card">
<div class="title">Profit vs Loss</div>
<canvas id="c_pnl"></canvas>
</div>

</div>

<script>

/* CONFIG */
const FILES={
  Test:"https://raw.githubusercontent.com/gutu99/bot-dashboard/main/Test.csv",
  Test1:"https://raw.githubusercontent.com/gutu99/bot-dashboard/main/Test1.csv",
  Test99:"https://raw.githubusercontent.com/gutu99/bot-dashboard/main/Test99.csv"
};

const COLORS={
  Test:"#f59e0b",
  Test1:"#06b6d4",
  Test99:"#a855f7"
};

let CH={};
let isUpdating=false;

/* CSV FIX HARD */
function csv(txt){
  const lines=txt.trim().split(/\r?\n/);
  if(lines.length<2)return[];

  const headers=lines[0].split(",").map(s=>s.trim());

  return lines.slice(1).map(line=>{
    const values=line.split(",");
    const obj={};

    headers.forEach((k,i)=>{
      let raw=(values[i]||"").trim();

      if(raw===""){ obj[k]=null; }
      else{
        const num=Number(raw.replace(",","."));
        obj[k]=isNaN(num)?raw:num;
      }
    });

    obj.pnl=typeof obj.pnl_net==="number"?obj.pnl_net:(obj.pnl||0);

    if(typeof obj.start_price==="number"&&typeof obj.dist==="number"){
      obj.end_price=+(obj.start_price+obj.dist).toFixed(2);
    }

    return obj;
  }).filter(r=>r.date).reverse();
}

/* CHART SAFE */
function mkChart(id,type,data){
  const el=document.getElementById(id);
  if(!el)return;

  if(CH[id]){
    try{CH[id].destroy();}catch(e){}
  }

  CH[id]=new Chart(el,{
    type,
    data,
    options:{
      responsive:true,
      maintainAspectRatio:false,
      animation:false
    }
  });
}

/* BOTS UI */
function renderBots(dfs){
  const el=document.getElementById("bots");
  el.innerHTML="";

  Object.entries(dfs).forEach(([name,df])=>{
    if(!df.length)return;

    const bal=df[0].balance||0;
    const pnl=bal-100;

    el.innerHTML+=`
    <div class="card">
      <div class="title">${name}</div>
      <div>$${bal.toFixed(2)}</div>
      <div class="${pnl>=0?'green':'red'}">
        ${pnl>=0?'+':''}${pnl.toFixed(2)}$
      </div>
    </div>`;
  });
}

/* CHARTS */
function renderCharts(dfs){
  const names=Object.keys(dfs).filter(n=>dfs[n].length);
  if(!names.length)return;

  const maxLen=Math.max(...names.map(n=>dfs[n].length));
  const labels=Array.from({length:maxLen},(_,i)=>i+1);

  // BALANCE
  mkChart("c_bal","line",{
    labels,
    datasets:names.map(n=>{
      const asc=[...dfs[n]].reverse();
      const pad=maxLen-asc.length;
      return{
        label:n,
        data:[...Array(pad).fill(null),...asc.map(r=>r.balance)],
        borderColor:COLORS[n],
        fill:true,
        tension:.3,
        pointRadius:0
      };
    })
  });

  // CUMULATIVE
  mkChart("c_cpnl","line",{
    labels,
    datasets:names.map(n=>{
      const asc=[...dfs[n]].reverse();
      let cum=0;
      return{
        label:n,
        data:asc.map(r=>{cum+=r.pnl||0;return cum}),
        borderColor:COLORS[n],
        fill:false,
        tension:.3,
        pointRadius:0
      };
    })
  });

  // PROFIT VS LOSS
  mkChart("c_pnl","bar",{
    labels:names,
    datasets:[
      {
        label:"Profit",
        data:names.map(n=>dfs[n].filter(r=>r.pnl>0).reduce((s,r)=>s+r.pnl,0)),
        backgroundColor:"#22c55e88"
      },
      {
        label:"Loss",
        data:names.map(n=>dfs[n].filter(r=>r.pnl<0).reduce((s,r)=>s+r.pnl,0)),
        backgroundColor:"#ef444488"
      }
    ]
  });
}

/* FETCH FIX */
async function fetchAll(){
  if(isUpdating)return;
  isUpdating=true;

  try{
    const dfs={};

    await Promise.all(
      Object.entries(FILES).map(async([name,url])=>{
        try{
          const r=await fetch(url+"?t="+Date.now(),{cache:"no-store"});
          dfs[name]=r.ok?csv(await r.text()):[];
        }catch{
          dfs[name]=[];
        }
      })
    );

    if(!Object.values(dfs).some(d=>d.length))return;

    document.getElementById("upd").textContent=
      "Update: "+new Date().toLocaleTimeString();

    renderBots(dfs);
    renderCharts(dfs);

  }finally{
    isUpdating=false;
  }
}

/* INIT */
fetchAll();
setInterval(fetchAll,5000);
window.addEventListener("focus",fetchAll);

</script>

</body>
</html>
