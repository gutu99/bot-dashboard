<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Bot Lab Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060a12;color:#e2e8f0;font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh}
.dash-bg{background:#060a12;background-image:radial-gradient(ellipse at 20% 10%,rgba(245,158,11,.05) 0%,transparent 50%),radial-gradient(ellipse at 80% 90%,rgba(6,182,212,.05) 0%,transparent 50%),radial-gradient(ellipse at 50% 50%,rgba(168,85,247,.03) 0%,transparent 60%);min-height:100vh;padding:16px}
@media(min-width:768px){.dash-bg{padding:32px 36px}}
.header{text-align:center;margin-bottom:24px}
.header h1{font-size:1.8rem;font-weight:800;letter-spacing:-.04em;background:linear-gradient(135deg,#f59e0b,#06b6d4,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
@media(min-width:768px){.header h1{font-size:2.2rem}}
.header-sub{font-size:.6rem;color:#334155;margin-top:6px;letter-spacing:.2em;text-transform:uppercase}
.live-dot{display:inline-block;width:6px;height:6px;background:#22c55e;border-radius:50%;margin-right:7px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
.timer-card{background:linear-gradient(135deg,#0c1220,#0c0c1a);border:1px solid #1e293b;border-radius:18px;padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;position:relative;overflow:hidden}
.timer-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#f59e0b,#06b6d4,#a855f7,#f59e0b);background-size:300%;animation:flow 4s linear infinite}
@keyframes flow{0%{background-position:0%}100%{background-position:300%}}
.t-item{display:flex;flex-direction:column;align-items:center}
.t-lbl{font-size:.5rem;color:#334155;text-transform:uppercase;letter-spacing:.1em}
.t-val{font-size:1.4rem;font-weight:800;color:#f1f5f9;line-height:1}
.t-val.g{color:#4ade80}.t-val.y{color:#f59e0b}.t-val.r{color:#f87171}.t-val.c{color:#06b6d4}
.t-div{width:1px;height:32px;background:#1e293b}
.t-prog{flex:1;min-width:140px}
.t-prog-lbl{display:flex;justify-content:space-between;font-size:.5rem;color:#334155;margin-bottom:5px}
.t-prog-bar{background:#1e293b;border-radius:99px;height:4px;overflow:hidden}
.t-prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#06b6d4,#a855f7);transition:width 1s linear}
.section-title{font-size:.72rem;font-weight:700;color:#334155;margin-bottom:14px;display:flex;align-items:center;justify-content:center;gap:10px;text-transform:uppercase;letter-spacing:.14em}
.section-title::before,.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,#1e293b,transparent)}
.global-banner{background:linear-gradient(135deg,#0c1220,#0c0c1a);border:1px solid #1e293b;border-radius:18px;padding:20px;margin-bottom:18px;position:relative;overflow:hidden}
.global-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#f59e0b,#06b6d4,#a855f7,#f59e0b);background-size:300%;animation:flow 4s linear infinite}
.gb-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
.gb-label{font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:#334155;margin-bottom:3px}
.gb-value-big{font-size:2.4rem;font-weight:800;letter-spacing:-.04em;color:#f1f5f9;line-height:1}
.gb-pnl{font-size:.88rem;margin-top:3px}
.gb-pnl.pos{color:#4ade80}.gb-pnl.neg{color:#f87171}
.gb-24h{background:rgba(34,197,94,.05);border:1px solid rgba(34,197,94,.15);border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.gb-24h-lbl{font-size:.55rem;color:#334155;text-transform:uppercase}
.gb-24h-val{font-size:1.3rem;font-weight:800}
.gb-24h-val.pos{color:#4ade80}.gb-24h-val.neg{color:#f87171}
.gb-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.gb-stat{background:rgba(255,255,255,.02);border:1px solid #1e293b;border-radius:10px;padding:8px;text-align:center}
.gb-stat-l{font-size:.52rem;color:#334155;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.gb-stat-v{font-size:1rem;font-weight:700;color:#cbd5e1}
.gb-stat-v.green{color:#4ade80}.gb-stat-v.red{color:#f87171}.gb-stat-v.gold{color:#f59e0b}
.gb-wr-lbl{display:flex;justify-content:space-between;font-size:.52rem;color:#334155;margin-bottom:5px}
.gb-wr-bar{background:#1e293b;border-radius:99px;height:5px;overflow:hidden}
.gb-wr-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#22c55e,#86efac);transition:width .6s}
.bots-grid{display:grid;grid-template-columns:1fr;gap:14px;margin-bottom:20px}
@media(min-width:600px){.bots-grid{grid-template-columns:repeat(3,1fr)}}
.bot-card{border-radius:16px;border:1px solid #1e293b;padding:18px 20px;position:relative;overflow:hidden}
.bot-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:16px 16px 0 0}
.bot-card.test{background:linear-gradient(160deg,#0f172a,#130d00)}.bot-card.test::before{background:#f59e0b}
.bot-card.test1{background:linear-gradient(160deg,#0f172a,#001318)}.bot-card.test1::before{background:#06b6d4}
.bot-card.test99{background:linear-gradient(160deg,#0f172a,#110014)}.bot-card.test99::before{background:#a855f7}
.bot-name{font-size:.64rem;letter-spacing:.16em;text-transform:uppercase;color:#475569;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:7px}
.bot-balance{font-size:2rem;font-weight:800;letter-spacing:-.04em;color:#f1f5f9;line-height:1;text-align:center;margin-bottom:4px}
.bot-pnl{font-size:.78rem;text-align:center;margin-bottom:8px}
.bot-pnl.pos{color:#4ade80}.bot-pnl.neg{color:#f87171}
.bot-24h{background:rgba(255,255,255,.03);border:1px solid #1e293b;border-radius:8px;padding:6px 10px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.bot-24h-lbl{font-size:.5rem;color:#334155;text-transform:uppercase}
.bot-24h-val{font-size:.9rem;font-weight:700}
.bot-24h-val.pos{color:#4ade80}.bot-24h-val.neg{color:#f87171}
.bot-stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:5px}
.bot-stats-row2{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:10px}
.stat-box{background:#080c14;border-radius:8px;padding:6px 8px;text-align:center}
.stat-lbl{font-size:.52rem;color:#334155;text-transform:uppercase;letter-spacing:.08em}
.stat-val{font-size:.9rem;font-weight:600;color:#94a3b8}
.stat-val.green{color:#4ade80}.stat-val.red{color:#f87171}.stat-val.gold{color:#f59e0b}
.wr-bar-bg{background:#1e293b;border-radius:4px;height:3px;overflow:hidden}
.wr-bar-fill{height:100%;border-radius:4px}
.wr-bar-fill.test{background:linear-gradient(90deg,#f59e0b,#fde68a)}
.wr-bar-fill.test1{background:linear-gradient(90deg,#06b6d4,#a5f3fc)}
.wr-bar-fill.test99{background:linear-gradient(90deg,#a855f7,#d8b4fe)}
.recent-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:20px}
@media(min-width:600px){.recent-grid{grid-template-columns:repeat(10,1fr)}}
.pill{border:1px solid #1e293b;border-radius:10px;padding:8px 4px;text-align:center;background:#0a0f1c}
.pill.win{border-color:rgba(74,222,128,.2);background:linear-gradient(160deg,#0a0f1c,#031a0d)}
.pill.loss{border-color:rgba(248,113,113,.2);background:linear-gradient(160deg,#0a0f1c,#1a0305)}
.pill-bot{font-size:.5rem;margin-bottom:3px}
.pill-res{font-size:.7rem;font-weight:700}
.pill.win .pill-res{color:#4ade80}.pill.loss .pill-res{color:#f87171}
.pill-pnl{font-size:.58rem;margin-top:2px}
.pill.win .pill-pnl{color:#86efac}.pill.loss .pill-pnl{color:#fca5a5}
.pill-time{font-size:.54rem;color:#475569;margin-top:3px;border-top:1px solid #1e293b;padding-top:3px}
.graphs-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:24px}
.graphs-2col{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:600px){.graphs-2col{grid-template-columns:1fr 1fr}}
.chart-box{background:linear-gradient(135deg,#0c1020,#0a0f1a);border:1px solid #1e293b;border-radius:16px;padding:16px;position:relative}
.chart-title{font-size:.7rem;color:#475569;text-transform:uppercase;letter-spacing:.12em;margin-bottom:12px;font-family:'DM Mono',monospace}
.chart-box canvas{max-height:240px}
.detail-grid{display:grid;grid-template-columns:1fr;gap:16px;margin-bottom:40px;padding-bottom:40px}
@media(min-width:900px){.detail-grid{grid-template-columns:repeat(3,1fr)}}
.detail-card{border-radius:16px;border:1px solid #1e293b;overflow:hidden;display:flex;flex-direction:column}
.detail-card.test{background:linear-gradient(170deg,#0c1020,#120d00)}
.detail-card.test1{background:linear-gradient(170deg,#0c1020,#001218)}
.detail-card.test99{background:linear-gradient(170deg,#0c1020,#100012)}
.detail-header{padding:16px 18px 12px;border-bottom:1px solid #1e293b;position:relative;overflow:hidden}
.detail-header::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;animation:shimmer 3s linear infinite;background-size:200%}
.detail-card.test .detail-header::before{background:linear-gradient(90deg,#f59e0b,#fde68a,#f59e0b)}
.detail-card.test1 .detail-header::before{background:linear-gradient(90deg,#06b6d4,#a5f3fc,#06b6d4)}
.detail-card.test99 .detail-header::before{background:linear-gradient(90deg,#a855f7,#d8b4fe,#a855f7)}
@keyframes shimmer{0%{background-position:-200%}100%{background-position:200%}}
.detail-title{font-size:1rem;font-weight:800;color:#f1f5f9}
.detail-sub{font-size:.52rem;color:#334155;letter-spacing:.12em;text-transform:uppercase;margin-top:2px}
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:10px 12px;border-bottom:1px solid #1e293b}
.kpi{background:rgba(255,255,255,.02);border:1px solid #1e293b;border-radius:8px;padding:6px 7px;text-align:center}
.kpi-lbl{font-size:.44rem;color:#334155;text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px}
.kpi-val{font-size:.84rem;font-weight:700;color:#cbd5e1}
.kpi-val.g{color:#4ade80}.kpi-val.r{color:#f87171}.kpi-val.y{color:#fbbf24}
.kpi-val.b{color:#60a5fa}.kpi-val.t{color:#f59e0b}.kpi-val.c{color:#06b6d4}.kpi-val.v{color:#a855f7}
.zone-row{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:10px 12px;border-bottom:1px solid #1e293b}
.zone-pill{border-radius:8px;padding:8px;text-align:center;border:1px solid}
.zone-pill.spike{background:rgba(245,158,11,.05);border-color:rgba(245,158,11,.2)}
.zone-pill.gold-z{background:rgba(250,204,21,.05);border-color:rgba(250,204,21,.2)}
.zone-pill.lock{background:rgba(16,185,129,.05);border-color:rgba(16,185,129,.2)}
.zone-name{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.zone-pill.spike .zone-name{color:#f59e0b}.zone-pill.gold-z .zone-name{color:#facc15}.zone-pill.lock .zone-name{color:#10b981}
.zone-stats{display:flex;justify-content:center;gap:8px}.zs{text-align:center}
.zs-l{font-size:.42rem;color:#334155;text-transform:uppercase}.zs-v{font-size:.76rem;font-weight:700;color:#94a3b8}
.exit-row{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:10px 12px;border-bottom:1px solid #1e293b}
.exit-pill{background:rgba(255,255,255,.02);border:1px solid #1e293b;border-radius:8px;padding:7px 4px;text-align:center}
.exit-icon{font-size:.9rem;margin-bottom:3px}.exit-lbl{font-size:.42rem;color:#334155;text-transform:uppercase}
.exit-val{font-size:.95rem;font-weight:700}.exit-sub{font-size:.42rem;color:#334155;margin-top:1px}
.exit-val.g{color:#4ade80}.exit-val.r{color:#f87171}.exit-val.y{color:#fbbf24}
.prices-section{padding:10px 12px;border-bottom:1px solid #1e293b}
.prices-lbl{font-size:.52rem;color:#334155;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.prices-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.price-box{background:rgba(255,255,255,.02);border:1px solid #1e293b;border-radius:8px;padding:6px;text-align:center}
.price-box-lbl{font-size:.44rem;color:#334155;text-transform:uppercase;margin-bottom:2px}
.price-box-val{font-size:.84rem;font-weight:700}
.mini-chart-wrap{padding:10px 12px;border-bottom:1px solid #1e293b}
.mini-chart-wrap canvas{max-height:100px}
.tbl-header{padding:10px 12px;border-bottom:1px solid #1e293b;display:flex;align-items:center;justify-content:space-between}
.tbl-title{font-size:.78rem;font-weight:700;color:#f1f5f9}
.tbl-badge{font-size:.52rem;color:#475569;background:#1e293b;padding:2px 8px;border-radius:99px}
.tbl-wrap{overflow-x:auto;max-height:260px;overflow-y:auto}
table{width:100%;border-collapse:collapse;min-width:600px}
thead tr{background:#060a12;position:sticky;top:0;z-index:2}
th{font-family:'DM Mono',monospace;font-size:7px;letter-spacing:.1em;text-transform:uppercase;color:#1e293b;padding:5px;border-bottom:1px solid #1e293b;text-align:center;white-space:nowrap}
td{font-family:'DM Mono',monospace;font-size:8px;text-align:center;color:#64748b;padding:4px;border-bottom:1px solid #0f172a;white-space:nowrap}
tr.win-row td{background:rgba(34,197,94,.06)}
tr.loss-row td{background:rgba(239,68,68,.06)}
td.win{color:#22c55e;font-weight:700}td.loss{color:#ef4444;font-weight:700}
td.pos{color:#4ade80;font-weight:700}td.neg{color:#f87171;font-weight:700}
td.spike-c{color:#f59e0b;font-weight:700}td.gold-c{color:#facc15;font-weight:700}td.lock-c{color:#10b981;font-weight:700}
td.target-c{color:#4ade80;font-weight:700}td.trail-c{color:#a3e635;font-weight:700}
td.stop-c{color:#f87171;font-weight:700}td.rev-c{color:#fbbf24;font-weight:700}
td.end-c{color:#475569}td.safe-c{color:#60a5fa}
.empty-state{color:#334155;text-align:center;padding:30px;font-size:.75rem}
</style>
</head>
<body>
<div class="dash-bg">
  <div class="header">
    <h1>Bot Lab Dashboard</h1>
    <div style="display:flex;align-items:center;justify-content:center">
      <span class="live-dot"></span>
      <span class="header-sub">LIVE · TEST · TEST1 · TEST99</span>
    </div>
  </div>
  <div id="timer_bar"></div>
  <div id="global_banner"></div>
  <div class="section-title">📊 Bot Overview</div>
  <div id="bots_row" class="bots-grid"></div>
  <div class="section-title">⚡ Recent Activity</div>
  <div id="recent"></div>
  <div class="section-title">📈 Balance Curves</div>
  <div class="graphs-grid">
    <div class="chart-box"><div class="chart-title">Balance Curves</div><canvas id="chart_balance"></canvas></div>
    <div class="graphs-2col">
      <div class="chart-box"><div class="chart-title">Profit vs Loss</div><canvas id="chart_pnl"></canvas></div>
      <div class="chart-box"><div class="chart-title">Win Rate %</div><canvas id="chart_wr"></canvas></div>
    </div>
  </div>
  <div class="section-title">🔬 Bot Analysis</div>
  <div id="details" class="detail-grid"></div>
</div>

<script>
const FILES={Test:"https://raw.githubusercontent.com/gutu99/bot-dashboard/main/Test.csv",Test1:"https://raw.githubusercontent.com/gutu99/bot-dashboard/main/Test1.csv",Test99:"https://raw.githubusercontent.com/gutu99/bot-dashboard/main/Test99.csv"};
const COLORS={Test:"#f59e0b",Test1:"#06b6d4",Test99:"#a855f7"};
const ICONS={Test:"🔬",Test1:"⚗️",Test99:"🧬"};
const SEED=100;
let charts={};

function parseCSV(text){
  const lines=text.trim().split("\n");
  if(lines.length<2)return[];
  const headers=lines[0].split(",").map(h=>h.trim().replace(/\r/g,""));
  const rows=[];
  for(let i=1;i<lines.length;i++){
    const vals=lines[i].split(",");
    const obj={};
    headers.forEach((h,j)=>{const v=(vals[j]||"").trim().replace(/\r/g,"");obj[h]=(!isNaN(v)&&v!=="")?parseFloat(v):v;});
    rows.push(obj);
  }
  return rows.reverse();
}

function ps(v){return v>=0?"+":""}
function pc(v){return v>=0?"pos":"neg"}

function parseDT(r){
  if(r.date&&r.time){const d=new Date(`${r.date}T${r.time}`);if(!isNaN(d))return d;}
  return null;
}
function p24h(rows){
  const cut=Date.now()-86400000;let s=0;
  rows.forEach(r=>{const dt=parseDT(r);if(dt&&dt.getTime()>=cut)s+=(r.pnl||0);});
  return Math.round(s*100)/100;
}

function updateTimer(){
  const now=new Date(),ts=Math.floor(now.getTime()/1000),tl=300-(ts%300);
  const pct=((300-tl)/300*100).toFixed(1);
  const col=tl>60?"g":(tl>20?"y":"r");
  const mm=Math.floor(tl/60),ss=String(tl%60).padStart(2,"0");
  document.getElementById("timer_bar").innerHTML=`<div class="timer-card">
    <div class="t-item"><div class="t-lbl">🕐 Ora</div><div class="t-val c">${now.toTimeString().slice(0,8)}</div></div>
    <div class="t-div"></div>
    <div class="t-item"><div class="t-lbl">⏱ Rundă</div><div class="t-val ${col}">${mm}:${ss}</div></div>
    <div class="t-div"></div>
    <div class="t-item"><div class="t-lbl">📅 Data</div><div class="t-val" style="font-size:1rem">${now.toLocaleDateString("ro-RO")}</div></div>
    <div class="t-div"></div>
    <div class="t-prog">
      <div class="t-prog-lbl"><span>Progres rundă</span><span>${pct}%</span></div>
      <div class="t-prog-bar"><div class="t-prog-fill" style="width:${pct}%"></div></div>
    </div>
  </div>`;
}

function mkChart(id,cfg){if(charts[id])charts[id].destroy();const c=document.getElementById(id);if(c)charts[id]=new Chart(c,cfg);}

const PL={responsive:true,maintainAspectRatio:true,plugins:{legend:{labels:{color:"#475569",font:{family:"DM Mono",size:9}}}},scales:{x:{grid:{color:"#0f172a"},ticks:{color:"#334155",font:{size:8}}},y:{grid:{color:"#0f172a"},ticks:{color:"#334155",font:{size:8}}}}};

async function update(){
  const dfs={};
  for(const[name,url]of Object.entries(FILES)){
    try{const res=await fetch(url+"?t="+Date.now());dfs[name]=res.ok?parseCSV(await res.text()):[];}
    catch(e){dfs[name]=[];}
  }
  renderBanner(dfs);renderBotCards(dfs);renderRecent(dfs);renderGlobalCharts(dfs);renderDetails(dfs);
}

function renderBanner(dfs){
  const frames=Object.values(dfs).filter(d=>d.length>0);
  if(!frames.length){document.getElementById("global_banner").innerHTML=`<div class="global-banner"><div class="empty-state">Nicio dată disponibilă</div></div>`;return;}
  const all=frames.flat();
  const bal=frames.reduce((s,d)=>s+(d[0]?.balance||0),0);
  const pnl=Math.round((bal-SEED*frames.length)*100)/100;
  const nn=all.length,w=all.filter(r=>r.result==="WIN").length,l=all.filter(r=>r.result==="LOSS").length;
  const wr=nn?(w/nn*100).toFixed(1):0;
  const prof=Math.round(all.filter(r=>r.pnl>0).reduce((s,r)=>s+r.pnl,0)*100)/100;
  const losv=Math.round(all.filter(r=>r.pnl<0).reduce((s,r)=>s+r.pnl,0)*100)/100;
  const fee=Math.round(all.reduce((s,r)=>s+(r.fee||0),0)*100)/100;
  const p24=frames.reduce((s,d)=>s+p24h(d),0).toFixed(2);
  const wrCls=wr>=60?"green":(wr>=50?"gold":"red");
  document.getElementById("global_banner").innerHTML=`<div class="global-banner">
    <div class="gb-top"><div>
      <div class="gb-label">🧪 Total Balance</div>
      <div class="gb-value-big">$${bal.toFixed(2)}</div>
      <div class="gb-pnl ${pc(pnl)}">${ps(pnl)}${pnl}$ all time</div>
    </div></div>
    <div class="gb-24h">
      <div><div class="gb-24h-lbl">📅 Profit 24h</div><div style="font-size:.48rem;color:#475569">toate boturile</div></div>

function renderRecent(dfs){
  const all=[];
  for(const[name,df]of Object.entries(dfs))df.forEach(r=>all.push({...r,_bot:name,_dt:parseDT(r)}));
  all.sort((a,b)=>{if(!a._dt&&!b._dt)return 0;if(!a._dt)return 1;if(!b._dt)return-1;return b._dt-a._dt;});
  const top=all.slice(0,10);
  if(!top.length){document.getElementById("recent").innerHTML=`<div style="color:#334155;font-size:.75rem">Nicio activitate</div>`;return;}
  let html=`<div class="recent-grid">`;
  top.forEach(r=>{
    const res=String(r.result||"?").toUpperCase(),pnlv=r.pnl||0,bot=r._bot;
    const color=COLORS[bot],icon=ICONS[bot],ts=r._dt?r._dt.toTimeString().slice(0,5):"—";
    const cls=res==="WIN"?"win":"loss";
    html+=`<div class="pill ${cls}"><div class="pill-bot" style="color:${color}">${icon} ${bot}</div><div class="pill-res">${res}</div><div class="pill-pnl">${ps(pnlv)}${pnlv.toFixed(2)}$</div><div class="pill-time">${ts}</div></div>`;
  });
  document.getElementById("recent").innerHTML=html+`</div>`;
}

function avg(arr,key){return arr.length?arr.reduce((s,r)=>s+(r[key]||0),0)/arr.length:null;}
function safeAvg(df,key){const v=avg(df,key);return v!==null&&df[0]&&df[0][key]!==undefined?v.toFixed(3):"—";}
