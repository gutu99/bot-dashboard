<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bot Dashboard</title>

<style>
body {
    background: #060a12;
    color: #e2e8f0;
    font-family: Arial;
    padding: 20px;
}
.card {
    background: #0c1220;
    border-radius: 12px;
    padding: 15px;
    margin-bottom: 10px;
}
.value {
    font-size: 24px;
    font-weight: bold;
}
.green { color: #4ade80; }
.red { color: #f87171; }
h2 {
    margin-bottom: 20px;
}
</style>
</head>

<body>

<h2>📊 Bot Dashboard</h2>

<div class="card">
    <div>Total Balance</div>
    <div id="balance" class="value">Loading...</div>
</div>

<div class="card">
    <div>Total PnL</div>
    <div id="pnl" class="value">Loading...</div>
</div>

<div class="card">
    <div>Win Rate</div>
    <div id="wr" class="value">Loading...</div>
</div>

<script>
window.onload = function() {

const FILES = {
    Test: "https://raw.githubusercontent.com/gutu99/bot-dashboard/main/Test.csv",
    Test1: "https://raw.githubusercontent.com/gutu99/bot-dashboard/main/Test1.csv",
    Test99: "https://raw.githubusercontent.com/gutu99/bot-dashboard/main/Test99.csv"
};

async function loadData() {
    try {
        let totalBalance = 0;
        let totalTrades = 0;
        let totalWins = 0;

        for (let key in FILES) {
            const res = await fetch(FILES[key] + "?t=" + Date.now());

            if (!res.ok) continue;

            const text = await res.text();
            const rows = text.trim().split("\n");

            if (rows.length < 2) continue;

            const headers = rows[0].split(",");
            const last = rows[rows.length - 1].split(",");

            const data = {};
            headers.forEach((h, i) => data[h] = last[i]);

            totalBalance += parseFloat(data.balance || 0);
            totalTrades += rows.length - 1;
            totalWins += rows.filter(r => r.includes("WIN")).length;
        }

        if (totalTrades === 0) return;

        let pnl = (totalBalance - 300).toFixed(2);
        let wr = (totalWins / totalTrades * 100).toFixed(1);

        document.getElementById("balance").innerText = "$" + totalBalance.toFixed(2);

        let pnlEl = document.getElementById("pnl");
        pnlEl.innerText = pnl;
        pnlEl.className = "value " + (pnl >= 0 ? "green" : "red");

        document.getElementById("wr").innerText = wr + "%";

    } catch (e) {
        console.log("ERROR:", e);
    }
}

setInterval(loadData, 3000);
loadData();

};
</script>

</body>
</html>
