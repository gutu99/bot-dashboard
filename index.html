<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#03060e">
<title>Bot Lab</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#03060e;--s1:#07101f;--s2:#0b1628;--b0:#0f2040;--b1:#1a3060;
  --text:#e2eeff;--dim:#4a6a9a;--dim2:#2a4068;
  --amber:#f59e0b;--cyan:#06b6d4;--purp:#a855f7;
  --green:#22c55e;--glit:#4ade80;--red:#ef4444;--rlit:#f87171;
  --gold:#fbbf24;--blue:#60a5fa;
  --r:12px;--rsm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;overflow-x:hidden;padding-bottom:env(safe-area-inset-bottom,20px)}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 70% 40% at 20% 0%,rgba(245,158,11,.07) 0%,transparent 55%),
    radial-gradient(ellipse 60% 50% at 80% 100%,rgba(6,182,212,.07) 0%,transparent 55%),
    radial-gradient(ellipse 50% 60% at 50% 50%,rgba(168,85,247,.04) 0%,transparent 65%);}
.root{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 12px 40px}
@media(min-width:900px){.root{max-width:1100px}}

/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 0 12px;border-bottom:1px solid var(--b0);margin-bottom:14px}
.hdr-title{font-size:1.15rem;font-weight:700;letter-spacing:-.01em;color:#fff}
.hdr-title span{background:linear-gradient(90deg,var(--amber),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-right{display:flex;align-items:center;gap:8px}
.live-pill{display:flex;align-items:center;gap:5px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);border-radius:99px;padding:4px 10px;font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--glit);letter-spacing:.08em}
.ldot{width:5px;height:5px;border-radius:50%;background:var(--glit);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
#upd-time{font-family:'IBM Plex Mono',monospace;font-size:.5rem;color:var(--dim)}

/* TIMER */
.timer{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px}
.t-box{background:var(--s1);border:1px solid var(--b0);border-radius:var(--rsm);padding:8px 10px;position:relative;overflow:hidden}
.t-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--amber),var(--cyan),var(--purp));animation:flow 4s linear infinite;background-size:200%}
@keyframes flow{0%{background-position:0%}100%{background-position:200%}}
.t-lbl{font-family:'IBM Plex Mono',monospace;font-size:.48rem;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px}
.t-val{font-size:.9rem;font-weight:700;color:#fff}
.t-val.c{color:var(--cyan)}.t-val.g{color:var(--glit)}.t-val.y{color:var(--amber)}.t-val.r{color:var(--rlit)}
.timer-prog{background:var(--s1);border:1px solid var(--b0);border-radius:var(--rsm);padding:8px 12px;margin-bottom:12px}
.tp-row{display:flex;justify-content:space-between;margin-bottom:5px}
.tp-lbl{font-family:'IBM Plex Mono',monospace;font-size:.48rem;color:var(--dim)}
.tp-val{font-family:'IBM Plex Mono',monospace;font-size:.48rem;color:var(--cyan)}
.tp-bg{background:var(--b0);border-radius:99px;height:3px;overflow:hidden}
.tp-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--cyan),var(--purp));transition:width 1s linear}

/* SEC */
.sec{font-family:'IBM Plex Mono',monospace;font-size:.55rem;color:var(--dim);text-transform:uppercase;letter-spacing:.15em;display:flex;align-items:center;gap:8px;margin:16px 0 10px}
.sec::after{content:'';flex:1;height:1px;background:var(--b0)}

/* BANNER */
.banner{background:var(--s1);border:1px solid var(--b0);border-radius:var(--r);position:relative;overflow:hidden;margin-bottom:12px}
.banner::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--amber),var(--cyan),var(--purp),var(--amber));background-size:300%;animation:flow 4s linear infinite}
.bn-main{padding:14px 14px 10px}
.bn-lbl{font-family:'IBM Plex Mono',monospace;font-size:.5rem;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
.bn-bal{font-size:2.2rem;font-weight:700;letter-spacing:-.03em;color:#fff;line-height:1}
.bn-sub{font-size:.82rem;font-weight:600;margin-top:4px}
.bn-sub.pos{color:var(--glit)}.bn-sub.neg{color:var(--rlit)}
.bn-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px 14px;border-top:1px solid var(--b0)}
.bn-cell{display:flex;flex-direction:column;gap:2px}
.bn-cl{font-family:'IBM Plex Mono',monospace;font-size:.47rem;color:var(--dim);text-transform:uppercase;letter-spacing:.06em}
.bn-cv{font-size:.88rem;font-weight:700}
.bn-cv.pos{color:var(--glit)}.bn-cv.neg{color:var(--rlit)}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;padding:10px 14px;border-top:1px solid var(--b0)}
.sg{background:var(--s2);border-radius:var(--rsm);padding:7px 6px;text-align:center;border:1px solid var(--b0)}
.sg-l{font-family:'IBM Plex Mono',monospace;font-size:.44rem;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.sg-v{font-size:.85rem;font-weight:700;color:var(--text)}
.sg-v.g{color:var(--glit)}.sg-v.r{color:var(--rlit)}.sg-v.y{color:var(--gold)}.sg-v.c{color:var(--cyan)}
.wr-bar-wrap{padding:10px 14px;border-top:1px solid var(--b0)}
.wr-row{display:flex;justify-content:space-between;margin-bottom:5px}
.wr-lbl{font-family:'IBM Plex Mono',monospace;font-size:.5rem;color:var(--dim)}
.wr-pct{font-family:'IBM Plex Mono',monospace;font-size:.5rem;font-weight:600}
.wr-bg{background:var(--b0);border-radius:99px;height:4px;overflow:hidden}
.wr-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--green),var(--glit));transition:width .8s}

/* BOT CARDS */
.bots{display:flex;flex-direction:column;gap:8px}
@media(min-width:900px){.bots{flex-direction:row}}
.bc{background:var(--s1);border:1px solid var(--b0);border-radius:var(--r);position:relative;overflow:hidden;flex:1}
.bc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0}
.bc.test::before{background:var(--amber)}.bc.test1::before{background:var(--cyan)}.bc.test99::before{background:var(--purp)}
.bc.test{background:linear-gradient(160deg,var(--s1),#150e00)}
.bc.test1{background:linear-gradient(160deg,var(--s1),#001520)}
.bc.test99{background:linear-gradient(160deg,var(--s1),#130015)}
.bc-head{padding:12px 14px 8px;display:flex;align-items:center;justify-content:space-between}
.bc-name{font-family:'IBM Plex Mono',monospace;font-size:.58rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.bc-tag{font-family:'IBM Plex Mono',monospace;font-size:.45rem;padding:2px 7px;border-radius:4px;border:1px solid;letter-spacing:.05em}
.bc-bal{font-size:1.9rem;font-weight:700;letter-spacing:-.03em;color:#fff;line-height:1;padding:0 14px 2px}
.bc-pnl{font-size:.78rem;font-weight:600;padding:0 14px 8px}
.bc-pnl.pos{color:var(--glit)}.bc-pnl.neg{color:var(--rlit)}
.bc-24h{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;border-top:1px solid var(--b0);border-bottom:1px solid var(--b0);margin-bottom:8px}
.bc-24h-l{font-family:'IBM Plex Mono',monospace;font-size:.47rem;color:var(--dim);text-transform:uppercase}
.bc-24h-v{font-size:.82rem;font-weight:700}
.bc-24h-v.pos{color:var(--glit)}.bc-24h-v.neg{color:var(--rlit)}.bc-24h-v.neu{color:var(--dim)}
.bc-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:0 10px 8px}
.bc-stats2{display:grid;grid-template-columns:repeat(2,1fr);gap:4px;padding:0 10px 8px}
.bs{background:rgba(0,0,0,.2);border-radius:6px;padding:5px 6px;text-align:center;border:1px solid var(--b0)}
.bs-l{font-family:'IBM Plex Mono',monospace;font-size:.43rem;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin-bottom:1px}
.bs-v{font-size:.82rem;font-weight:700;color:#94a3b8}
.bs-v.g{color:var(--glit)}.bs-v.r{color:var(--rlit)}.bs-v.y{color:var(--gold)}.bs-v.c{color:var(--cyan)}
.bc-wrbar{margin:0 10px 10px;background:var(--b0);border-radius:99px;height:3px;overflow:hidden}
.bc-wrfill{height:100%;border-radius:99px;transition:width .6s}
.bc.test .bc-wrfill{background:linear-gradient(90deg,var(--amber),#fde68a)}
.bc.test1 .bc-wrfill{background:linear-gradient(90deg,var(--cyan),#a5f3fc)}
.bc.test99 .bc-wrfill{background:linear-gradient(90deg,var(--purp),#d8b4fe)}

/* RECENT */
.pills{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
@media(min-width:600px){.pills{grid-template-columns:repeat(10,1fr)}}
.pill{border:1px solid var(--b0);border-radius:9px;padding:7px 4px;text-align:center;transition:transform .15s;cursor:default}
.pill:active{transform:scale(.96)}
.pill.w{border-color:rgba(74,222,128,.22);background:linear-gradient(160deg,var(--s1),#011a06)}
.pill.l{border-color:rgba(239,68,68,.22);background:linear-gradient(160deg,var(--s1),#1a0102)}
.p-bot{font-family:'IBM Plex Mono',monospace;font-size:.44rem;margin-bottom:2px}
.p-res{font-size:.65rem;font-weight:700;letter-spacing:.03em}
.pill.w .p-res{color:var(--glit)}.pill.l .p-res{color:var(--rlit)}
.p-pnl{font-size:.54rem;font-weight:600;margin-top:1px}
.pill.w .p-pnl{color:#86efac}.pill.l .p-pnl{color:#fca5a5}
.p-time{font-family:'IBM Plex Mono',monospace;font-size:.44rem;color:var(--dim);margin-top:2px;padding-top:2px;border-top:1px solid var(--b0)}
.p-zone{font-family:'IBM Plex Mono',monospace;font-size:.41rem;margin-top:1px;font-weight:600}

/* CHARTS */
.chart-card{background:var(--s1);border:1px solid var(--b0);border-radius:var(--r);padding:12px 12px 10px;margin-bottom:8px}
.ch-lbl{font-family:'IBM Plex Mono',monospace;font-size:.52rem;color:var(--dim2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
.chart-card canvas{display:block;width:100%!important}
.charts-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.charts-2 .chart-card{margin-bottom:0}

/* DETAIL */
.dc{background:var(--s1);border:1px solid var(--b0);border-radius:var(--r);overflow:hidden;margin-bottom:8px}
.dc.test{background:linear-gradient(160deg,var(--s1),#120d00)}
.dc.test1{background:linear-gradient(160deg,var(--s1),#001218)}
.dc.test99{background:linear-gradient(160deg,var(--s1),#0e0013)}
.dc-hdr{padding:12px 14px;border-bottom:1px solid var(--b0);position:relative;overflow:hidden}
.dc-hdr::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background-size:200%;animation:shimmer 3s linear infinite}
.dc.test .dc-hdr::after{background:linear-gradient(90deg,var(--amber),#fde68a,var(--amber))}
.dc.test1 .dc-hdr::after{background:linear-gradient(90deg,var(--cyan),#a5f3fc,var(--cyan))}
.dc.test99 .dc-hdr::after{background:linear-gradient(90deg,var(--purp),#d8b4fe,var(--purp))}
@keyframes shimmer{0%{background-position:-200%}100%{background-position:200%}}
.dc-hdr-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.dc-name{font-size:.95rem;font-weight:700;color:#fff}
.dc-sub{font-family:'IBM Plex Mono',monospace;font-size:.44rem;color:var(--dim);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}
.dc-bal-block{text-align:right}
.dc-bal-l{font-family:'IBM Plex Mono',monospace;font-size:.43rem;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:1px}
.dc-bal-v{font-size:1.4rem;font-weight:700;color:#fff;letter-spacing:-.03em;line-height:1}
.dc-pnl{font-size:.7rem;font-weight:700;margin-top:2px}
.dc-pnl.pos{color:var(--glit)}.dc-pnl.neg{color:var(--rlit)}
.dc-24h{font-family:'IBM Plex Mono',monospace;font-size:.54rem;font-weight:600;margin-top:1px}
.dc-24h.pos{color:var(--glit)}.dc-24h.neg{color:var(--rlit)}
.kpi-g{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:8px 10px;border-bottom:1px solid var(--b0)}
.kpi{background:rgba(0,0,0,.2);border-radius:6px;padding:6px;text-align:center;border:1px solid var(--b0)}
.kpi-l{font-family:'IBM Plex Mono',monospace;font-size:.41rem;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.kpi-v{font-size:.79rem;font-weight:700;color:var(--text)}
.kvg{color:var(--glit)}.kvr{color:var(--rlit)}.kvy{color:var(--gold)}.kvc{color:var(--cyan)}.kvp{color:var(--purp)}.kva{color:var(--amber)}.kvb{color:var(--blue)}
.price-sec{padding:8px 10px;border-bottom:1px solid var(--b0)}
.price-sec-lbl{font-family:'IBM Plex Mono',monospace;font-size:.46rem;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.price-sec-lbl::after{content:'';flex:1;height:1px;background:var(--b0)}
.price-g{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.pb{background:rgba(0,0,0,.2);border:1px solid var(--b0);border-radius:6px;padding:6px 8px}
.pb-l{font-family:'IBM Plex Mono',monospace;font-size:.41rem;color:var(--dim);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.pb-v{font-size:.78rem;font-weight:700}
.zone-sec{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:8px 10px;border-bottom:1px solid var(--b0)}
.zp{border-radius:8px;padding:8px 5px;text-align:center;border:1px solid}
.zp.spike{background:rgba(245,158,11,.06);border-color:rgba(245,158,11,.22)}
.zp.goldz{background:rgba(250,204,21,.06);border-color:rgba(250,204,21,.22)}
.zp.early{background:rgba(96,165,250,.06);border-color:rgba(96,165,250,.22)}
.z-name{font-family:'IBM Plex Mono',monospace;font-size:.5rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.zp.spike .z-name{color:var(--amber)}.zp.goldz .z-name{color:#facc15}.zp.early .z-name{color:var(--blue)}
.z-stats{display:flex;flex-direction:column;gap:2px}
.z-row{display:flex;justify-content:space-between;align-items:center}
.z-key{font-family:'IBM Plex Mono',monospace;font-size:.39rem;color:var(--dim);text-transform:uppercase}
.z-val{font-family:'IBM Plex Mono',monospace;font-size:.6rem;font-weight:700;color:var(--text)}
.exit-sec{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:8px 10px;border-bottom:1px solid var(--b0)}
.ep{background:rgba(0,0,0,.2);border:1px solid var(--b0);border-radius:7px;padding:7px 4px;text-align:center}
.ep-icon{font-size:.8rem;margin-bottom:2px}
.ep-lbl{font-family:'IBM Plex Mono',monospace;font-size:.39rem;color:var(--dim);text-transform:uppercase;letter-spacing:.03em}
.ep-val{font-size:.9rem;font-weight:700;margin-top:1px}
.ep-val.g{color:var(--glit)}.ep-val.r{color:var(--rlit)}.ep-val.y{color:var(--gold)}.ep-val.c{color:var(--cyan)}
.mini-ch{padding:8px 10px;border-bottom:1px solid var(--b0)}
.mini-ch-l{font-family:'IBM Plex Mono',monospace;font-size:.45rem;color:var(--dim2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.mini-ch canvas{display:block;max-height:70px;width:100%!important}
.tbl-hdr{padding:8px 12px;border-bottom:1px solid var(--b0);display:flex;align-items:center;justify-content:space-between}
.tbl-ttl{font-size:.74rem;font-weight:600;color:var(--text)}
.tbl-bdg{font-family:'IBM Plex Mono',monospace;font-size:.45rem;color:var(--dim);background:var(--b0);padding:2px 8px;border-radius:99px}
.tbl-wrap{overflow-x:auto;max-height:220px;overflow-y:auto}
table{width:100%;border-collapse:collapse;min-width:580px}
thead tr{background:var(--bg);position:sticky;top:0;z-index:2}
th{font-family:'IBM Plex Mono',monospace;font-size:6px;letter-spacing:.07em;text-transform:uppercase;color:var(--dim);padding:5px;border-bottom:1px solid var(--b0);text-align:center;white-space:nowrap;font-weight:400}
td{font-family:'IBM Plex Mono',monospace;font-size:7px;text-align:center;color:#3d5a85;padding:4px 5px;border-bottom:1px solid rgba(15,32,64,.5);white-space:nowrap}
tbody tr:hover td{background:rgba(255,255,255,.012)}
tr.rw td{background:rgba(34,197,94,.04)}tr.rl td{background:rgba(239,68,68,.04)}
td.tw{color:var(--green);font-weight:600}td.tl{color:var(--red);font-weight:600}
td.tp{color:var(--glit);font-weight:600}td.tn{color:var(--rlit);font-weight:600}
td.tsp{color:var(--amber);font-weight:600}td.tgo{color:#facc15;font-weight:600}
td.tea{color:var(--blue);font-weight:600}td.tss{color:#f97316;font-weight:600}
td.ttg{color:var(--glit);font-weight:600}td.ttr{color:#a3e635;font-weight:600}
td.tst{color:var(--rlit);font-weight:600}td.trv{color:var(--gold);font-weight:600}td.ten{color:var(--dim)}
.empty{font-family:'IBM Plex Mono',monospace;color:var(--dim);text-align:center;padding:24px 12px;font-size:.62rem}
::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--b1);border-radius:2px}
</style>
</head>
<body>
<div class="root">
  <div class="hdr">
    <div class="hdr-title">⚗️ <span>Bot Lab</span></div>
    <div class="hdr-right">
      <div class="live-pill"><div class="ldot"></div>LIVE</div>
      <div id="upd-time">—</div>
    </div>
  </div>

  <div class="timer" id="timer"></div>
  <div class="timer-prog">
    <div class="tp-row"><div class="tp-lbl">Progres rundă 5min</div><div class="tp-val" id="tp-pct">0%</div></div>
    <div class="tp-bg"><div class="tp-fill" id="tp-fill" style="width:0%"></div></div>
  </div>

  <div class="sec">📊 Global</div>
  <div id="banner"></div>

  <div class="sec">🤖 Boturi</div>
  <div class="bots" id="bots"></div>

  <div class="sec">⚡ Activitate Recentă</div>
  <div class="pills" id="recent"></div>

  <div class="sec">📈 Grafice</div>
  <div class="chart-card"><div class="ch-lbl">Balance Curves</div><canvas id="c_bal" height="160"></canvas></div>
  <div class="chart-card"><div class="ch-lbl">Cumulative P&L</div><canvas id="c_cpnl" height="120"></canvas></div>
  <div class="charts-2">
    <div class="chart-card"><div class="ch-lbl">Profit vs Loss</div><canvas id="c_pnl" height="130"></canvas></div>
    <div class="chart-card"><div class="ch-lbl">Win Rate %</div><canvas id="c_wr" height="130"></canvas></div>
  </div>
  <div class="chart-card"><div class="ch-lbl">P&L Distribution</div><canvas id="c_dist" height="110"></canvas></div>

  <div class="sec">🔬 Analiză per Bot</div>
  <div id="details"></div>
</div>

<script>
/* ─────────────────────────────────────────────
   CONFIG
───────────────────────────────────────────── */
const FILES = {
  Test:  "https://raw.githubusercontent.com/gutu99/bot-dashboard/main/Test.csv",
  Test1: "https://raw.githubusercontent.com/gutu99/bot-dashboard/main/Test1.csv",
  Test99:"https://raw.githubusercontent.com/gutu99/bot-dashboard/main/Test99.csv"
};
const COL={Test:"#f59e0b",Test1:"#06b6d4",Test99:"#a855f7"};
const ICO={Test:"🔬",Test1:"⚗️",Test99:"🧬"};
const SEED=100;

/* ─────────────────────────────────────────────
   STATE — charts & dom built ONCE, updated after
───────────────────────────────────────────── */
let CHARTS={};       // chart.js instances
let BUILT=false;     // DOM built flag

/* ─────────────────────────────────────────────
   CSV
───────────────────────────────────────────── */
function parseCSV(txt){
  const lines=txt.trim().split("\n");
  if(lines.length<2)return[];
  const hdr=lines[0].split(",").map(h=>h.trim().replace(/\r/g,""));
  return lines.slice(1).map(line=>{
    const v=line.split(",");
    const o={};
    hdr.forEach((h,i)=>{const raw=(v[i]||"").trim().replace(/\r/g,"");o[h]=raw!==""&&!isNaN(raw)?parseFloat(raw):raw;});
    o.pnl=typeof o.pnl_net==="number"?o.pnl_net:(o.pnl||0);
    if(typeof o.start_price==="number"&&o.start_price>1000&&typeof o.dist==="number")
      o.end_price=Math.round((o.start_price+o.dist)*100)/100;
    return o;
  }).filter(r=>r.date).reverse();
}

/* ─────────────────────────────────────────────
   UTILS
───────────────────────────────────────────── */
const ps=v=>v>=0?"+":"";
const pc=v=>v>=0?"pos":"neg";
const pct=(w,t)=>t?(w/t*100).toFixed(1):"0.0";
function parseDT(r){if(r.date&&r.time){const d=new Date(`${r.date}T${r.time}`);if(!isNaN(d))return d;}return null;}
function p24(rows){const cut=Date.now()-86400000;return Math.round(rows.filter(r=>{const d=parseDT(r);return d&&d.getTime()>=cut;}).reduce((s,r)=>s+(r.pnl||0),0)*100)/100;}
function avgCol(df,key){if(!df.length||df[0][key]===undefined)return null;return df.reduce((s,r)=>s+(parseFloat(r[key])||0),0)/df.length;}
function zoneStats(df,zones){
  const col=["zone","bet_zone"].find(c=>df.length&&df[0][c]!==undefined);
  if(!col)return{t:0,w:0,pnl:0,wr:"0.0"};
  const sub=df.filter(r=>zones.includes(String(r[col]||"").toUpperCase()));
  const w=sub.filter(r=>r.result==="WIN").length;
  return{t:sub.length,w,pnl:Math.round(sub.reduce((s,r)=>s+(r.pnl||0),0)*100)/100,wr:pct(w,sub.length)};
}
function exCount(df,s){const col=["exit_type","exit"].find(c=>df.length&&df[0][c]!==undefined);return col?df.filter(r=>String(r[col]||"").toUpperCase().includes(s.toUpperCase())).length:0;}

/* ─────────────────────────────────────────────
   TIMER (runs every second, never causes flash)
───────────────────────────────────────────── */
function updateTimer(){
  const now=new Date(),ts=Math.floor(now.getTime()/1000),tl=300-(ts%300);
  const pct_=((300-tl)/300*100).toFixed(1),col=tl>60?"g":tl>20?"y":"r";
  const mm=Math.floor(tl/60),ss=String(tl%60).padStart(2,"0");
  setText("t-ora",now.toTimeString().slice(0,8));
  setClass("t-runda-val","t-val "+col);
  setText("t-runda-val",mm+":"+ss);
  setText("t-data",now.toLocaleDateString("ro-RO"));
  setText("tp-pct",pct_+"%");
  document.getElementById("tp-fill").style.width=pct_+"%";
}
function setText(id,v){const el=document.getElementById(id);if(el&&el.textContent!==v)el.textContent=v;}
function setClass(id,c){const el=document.getElementById(id);if(el&&el.className!==c)el.className=c;}

}

/* ─────────────────────────────────────────────
   CHART PALETTE
───────────────────────────────────────────── */
const CPL={
  responsive:true,maintainAspectRatio:false,animation:{duration:0},
  plugins:{legend:{labels:{color:"#2a4068",font:{family:"IBM Plex Mono",size:9}}}},
  scales:{
    x:{grid:{color:"rgba(15,32,64,.8)"},ticks:{color:"#2a4068",font:{family:"IBM Plex Mono",size:7}}},
    y:{grid:{color:"rgba(15,32,64,.8)"},ticks:{color:"#2a4068",font:{family:"IBM Plex Mono",size:7}}}
  }
};

/* Create or UPDATE a chart's data without destroying it */
function upsertChart(id, type, data, options){
  const el=document.getElementById(id);
  if(!el)return;
  if(CHARTS[id]){
    // smooth data update — no destroy/recreate = no flash
    CHARTS[id].data=data;
    Object.assign(CHARTS[id].options,options||{});
    CHARTS[id].update("none"); // "none" = no animation
    return;
  }
  CHARTS[id]=new Chart(el,{type,data,options:{...CPL,...(options||{}),animation:{duration:0}}});
}

/* ─────────────────────────────────────────────
   UPDATE ONLY TEXT VALUES (no innerHTML swap)
───────────────────────────────────────────── */
function sv(id,val){const el=document.getElementById(id);if(el&&String(el.textContent)!==String(val))el.textContent=val;}
function sc(id,cls){const el=document.getElementById(id);if(el&&el.className!==cls)el.className=cls;}
function ss(id,prop,val){const el=document.getElementById(id);if(el)el.style[prop]=val;}

/* ─────────────────────────────────────────────
   DATA → DOM (patch only changed values)
───────────────────────────────────────────── */
function patchBanner(dfs){
  const frames=Object.values(dfs).filter(d=>d.length>0);
  if(!frames.length)return;
  const all=frames.flat();
  const bal=frames.reduce((s,d)=>s+(d[0]?.balance||0),0);
  const pnl_=Math.round((bal-SEED*frames.length)*100)/100;
  const nn=all.length,w=all.filter(r=>r.result==="WIN").length,l=all.filter(r=>r.result==="LOSS").length;
  const wr_=pct(w,nn);
  const prof=Math.round(all.filter(r=>r.pnl>0).reduce((s,r)=>s+r.pnl,0)*100)/100;
  const losv=Math.round(all.filter(r=>r.pnl<0).reduce((s,r)=>s+r.pnl,0)*100)/100;
  const fee_=Math.round(all.reduce((s,r)=>s+(r.fee||0),0)*100)/100;
  const p24_=Math.round(frames.reduce((s,d)=>s+p24(d),0)*100)/100;
  const roi_=((bal-SEED*frames.length)/(SEED*frames.length)*100).toFixed(1);
  const avgW=w?(all.filter(r=>r.pnl>0).reduce((s,r)=>s+r.pnl,0)/w).toFixed(3):"0";
  const avgL=l?(all.filter(r=>r.pnl<0).reduce((s,r)=>s+r.pnl,0)/l).toFixed(3):"0";
  const best=Math.max(...all.map(r=>r.pnl||0)).toFixed(3);
  const worst=Math.min(...all.map(r=>r.pnl||0)).toFixed(3);
  const wrCol=parseFloat(wr_)>=60?"var(--glit)":parseFloat(wr_)>=50?"var(--gold)":"var(--rlit)";
  sv("bn-bal","$"+bal.toFixed(2));
  const pnlEl=document.getElementById("bn-pnl");
  if(pnlEl){pnlEl.textContent=`${ps(pnl_)}${pnl_}$ all-time · ROI ${ps(roi_)}${roi_}%`;pnlEl.className="bn-sub "+pc(pnl_);}
  const p24El=document.getElementById("bn-24h");
  if(p24El){p24El.textContent=`${ps(p24_)}${p24_}$`;p24El.className="bn-cv "+pc(p24_);}
  sv("bn-fee","$"+fee_);
  sv("sg-nn",nn);sv("sg-wr",wr_+"%");sv("sg-w",w);sv("sg-l",l);
  sv("sg-prof","+$"+prof);sv("sg-los","$"+losv);sv("sg-aw","+$"+avgW);sv("sg-al","$"+avgL);
  sv("sg-best","+$"+best);sv("sg-worst","$"+worst);
  const netEl=document.getElementById("sg-net");if(netEl){netEl.textContent=`${ps(pnl_)}${pnl_}$`;netEl.className="sg-v "+(pnl_>=0?"g":"r");}
  const roiEl=document.getElementById("sg-roi");if(roiEl){roiEl.textContent=`${ps(roi_)}${roi_}%`;roiEl.className="sg-v "+(parseFloat(roi_)>=0?"g":"r");}
  const wrPctEl=document.getElementById("wr-pct-lbl");if(wrPctEl){wrPctEl.textContent=wr_+"%";wrPctEl.style.color=wrCol;}
  ss("wr-fill","width",wr_+"%");
}

function patchBotCards(dfs){
  for(const[name,df] of Object.entries(dfs)){
    const cls=name.toLowerCase();
    if(!df.length)return;
    const bal=df[0].balance||0,pnl_=Math.round((bal-SEED)*100)/100,nn=df.length;
    const w=df.filter(r=>r.result==="WIN").length,l=df.filter(r=>r.result==="LOSS").length;
    const wr_=pct(w,nn);
    const prof=Math.round(df.filter(r=>r.pnl>0).reduce((s,r)=>s+r.pnl,0)*100)/100;
    const losv=Math.round(df.filter(r=>r.pnl<0).reduce((s,r)=>s+r.pnl,0)*100)/100;
    const fee_=Math.round(df.reduce((s,r)=>s+(r.fee||0),0)*100)/100;
    const roi_=((bal-SEED)/SEED*100).toFixed(1);
    const p24_=p24(df).toFixed(2);
    const wrC=parseFloat(wr_)>=60?"g":parseFloat(wr_)>=50?"y":"r";
    sv(`bc-bal-${cls}`,"$"+bal.toFixed(2));
    const pnlEl=document.getElementById(`bc-pnl-${cls}`);
    if(pnlEl){pnlEl.textContent=`${ps(pnl_)}${pnl_}$ · ROI ${ps(roi_)}${roi_}%`;pnlEl.className="bc-pnl "+pc(pnl_);}
    const p24El=document.getElementById(`bc-24h-${cls}`);
    if(p24El){p24El.textContent=`${ps(p24_)}${p24_}$`;p24El.className="bc-24h-v "+pc(p24_);}
    sv(`bc-nn-${cls}`,nn);
    const wrEl=document.getElementById(`bc-wr-${cls}`);if(wrEl){wrEl.textContent=wr_+"%";wrEl.className="bs-v "+wrC;}
    sv(`bc-wl-${cls}`,`${w}/${l}`);
    sv(`bc-prof-${cls}`,"+$"+prof);sv(`bc-los-${cls}`,"$"+losv);
    sv(`bc-fee-${cls}`,"$"+fee_);
    const netEl=document.getElementById(`bc-net-${cls}`);if(netEl){netEl.textContent=`${ps(pnl_)}${pnl_}$`;netEl.className="bs-v "+(pnl_>=0?"g":"r");}
    ss(`bc-wrf-${cls}`,"width",wr_+"%");
  }
}

function patchRecent(dfs){
  const all=[];
  for(const[nm,df] of Object.entries(dfs)) df.forEach(r=>all.push({...r,_bot:nm,_dt:parseDT(r)}));
  all.sort((a,b)=>{if(!a._dt&&!b._dt)return 0;if(!a._dt)return 1;if(!b._dt)return-1;return b._dt-a._dt;});
  const top=all.slice(0,10);
  const el=document.getElementById("recent");
  if(!top.length){el.innerHTML=`<div class="empty" style="grid-column:span 5">Nicio activitate</div>`;return;}
  const zColor=z=>{const u=String(z||"").toUpperCase();return u.includes("SPIKE")?"var(--amber)":u==="GOLD"?"#facc15":u==="EARLY"?"var(--blue)":"var(--dim)";};
  // Build new HTML and compare to avoid unnecessary repaint
  const newHtml=top.map(r=>{
    const res=String(r.result||"?").toUpperCase(),pv=r.pnl||0;
    const ts=r._dt?r._dt.toTimeString().slice(0,5):"—",zone=r.zone||r.bet_zone||"";
    return `<div class="pill ${res==="WIN"?"w":"l"}">
      <div class="p-bot" style="color:${COL[r._bot]}">${ICO[r._bot]} ${r._bot.replace("Test","T")}</div>
      <div class="p-res">${res}</div>
      <div class="p-pnl">${ps(pv)}${pv.toFixed(2)}$</div>
      <div class="p-time">${ts}</div>
      ${zone?`<div class="p-zone" style="color:${zColor(zone)}">${zone.slice(0,8)}</div>`:""}
    </div>`;
  }).join("");
  if(el.innerHTML!==newHtml) el.innerHTML=newHtml;
}

   CHARTS (upsert = no flash)
───────────────────────────────────────────── */
function patchCharts(dfs){
  const names=Object.keys(dfs).filter(n=>dfs[n].length>0);

  // Balance curves
  const balDS=names.map(n=>{
    const asc=[...dfs[n]].reverse();
    return{label:n,data:asc.map((r,i)=>({x:i+1,y:r.balance})),
      borderColor:COL[n],backgroundColor:COL[n]+"18",fill:true,tension:.35,pointRadius:0,borderWidth:2};
  });
  upsertChart("c_bal","line",{datasets:balDS},{parsing:false});

  // Cumulative PnL
  const cpDS=names.map(n=>{
    const asc=[...dfs[n]].reverse();let cum=0;
    return{label:n,data:asc.map((r,i)=>{cum+=(r.pnl||0);return{x:i+1,y:Math.round(cum*100)/100};}),
      borderColor:COL[n],backgroundColor:"transparent",fill:false,tension:.35,pointRadius:0,borderWidth:2};
  });
  upsertChart("c_cpnl","line",{datasets:cpDS},{parsing:false});

  // Profit vs Loss
  upsertChart("c_pnl","bar",{labels:names,datasets:[
    {label:"Profit",data:names.map(n=>Math.round(dfs[n].filter(r=>r.pnl>0).reduce((s,r)=>s+r.pnl,0)*100)/100),
      backgroundColor:"#22c55e88",borderColor:"#4ade80",borderWidth:1,borderRadius:4},
    {label:"Loss",data:names.map(n=>Math.round(dfs[n].filter(r=>r.pnl<0).reduce((s,r)=>s+r.pnl,0)*100)/100),
      backgroundColor:"#ef444488",borderColor:"#f87171",borderWidth:1,borderRadius:4}
  ]},{});

  // Win Rate
  upsertChart("c_wr","bar",{labels:names,datasets:[{
    label:"Win%",
    data:names.map(n=>{const d=dfs[n];return d.length?parseFloat(pct(d.filter(r=>r.result==="WIN").length,d.length)):0;}),
    backgroundColor:names.map(n=>COL[n]+"bb"),borderColor:names.map(n=>COL[n]),borderWidth:1,borderRadius:4
  }]},{scales:{...CPL.scales,y:{...CPL.scales.y,min:0,max:100}}});

  // Distribution
  const allPnl=Object.values(dfs).flat().map(r=>r.pnl||0).filter(v=>v!==0);
  if(allPnl.length){
    const mn=Math.floor(Math.min(...allPnl)*5)/5,mx=Math.ceil(Math.max(...allPnl)*5)/5;
    const step=0.2,bins=[];
    for(let b=mn;b<=mx+.001;b=Math.round((b+step)*100)/100)bins.push(b);
    upsertChart("c_dist","bar",{
      labels:bins.map(b=>b.toFixed(1)),
      datasets:[{label:"Trades",data:bins.map(b=>allPnl.filter(v=>v>=b&&v<b+step).length),
        backgroundColor:bins.map(b=>b>=0?"#22c55e77":"#ef444477"),borderWidth:0,borderRadius:3}]
    },{});
  }
}

/* ─────────────────────────────────────────────
   DETAIL CARDS PATCH
───────────────────────────────────────────── */
function tdCls(col,val){
  const v=typeof val==="number"?val:0;
  if(col==="result")return String(val).toUpperCase()==="WIN"?"tw":"tl";
  if(["pnl_net","pnl_gross","pnl"].includes(col))return v>0?"tp":v<0?"tn":"";
  if(["zone","bet_zone"].includes(col)){const u=String(val||"").toUpperCase();return u.includes("SPIKE_S")?"tss":u==="SPIKE"?"tsp":u==="GOLD"?"tgo":u==="EARLY"?"tea":"";}
  if(["exit_type","exit"].includes(col)){const u=String(val||"").toUpperCase();return u.includes("TARGET")||u.includes("TAKE")?"ttg":u.includes("TRAIL")?"ttr":u.includes("STOP")?"tst":u.includes("REVERS")?"trv":u.includes("END")?"ten":"";}
  return "";
}

function patchDetails(dfs){
  for(const[name,df] of Object.entries(dfs)){
    const cls=name.toLowerCase(),color=COL[name];
    if(!df.length)continue;
    const bal=df[0].balance||0,pnl_=Math.round((bal-SEED)*100)/100,nn=df.length;
    const w=df.filter(r=>r.result==="WIN").length,l=df.filter(r=>r.result==="LOSS").length;
    const wr_=pct(w,nn);
    const wins=df.filter(r=>r.pnl>0),losses=df.filter(r=>r.pnl<0);
    const profSum=Math.round(wins.reduce((s,r)=>s+r.pnl,0)*100)/100;
    const lossSum=Math.round(losses.reduce((s,r)=>s+r.pnl,0)*100)/100;
    const aw=wins.length?(wins.reduce((s,r)=>s+r.pnl,0)/wins.length).toFixed(3):"0";
    const al=losses.length?(losses.reduce((s,r)=>s+r.pnl,0)/losses.length).toFixed(3):"0";
    const best=Math.max(...df.map(r=>r.pnl||0)).toFixed(3);
    const worst=Math.min(...df.map(r=>r.pnl||0)).toFixed(3);
    const fee_=df.reduce((s,r)=>s+(r.fee||0),0).toFixed(3);
    const roi_=((bal-SEED)/SEED*100).toFixed(1);
    const p24_=p24(df).toFixed(2);
    const ep=avgCol(df,"entry_prob"),xp=avgCol(df,"exit_prob"),bp=avgCol(df,"best_prob");
    const mom=avgCol(df,"momentum"),vel=avgCol(df,"avg_velocity"),vlt=avgCol(df,"volatility");

    // Header
    sv(`dc-sub-${cls}`,`${nn} trades · SPIKE · GOLD · EARLY`);
    sv(`dc-bal-${cls}`,"$"+bal.toFixed(2));
    const dcpEl=document.getElementById(`dc-pnl-${cls}`);
    if(dcpEl){dcpEl.textContent=`${ps(pnl_)}${pnl_}$ · ROI ${ps(roi_)}${roi_}%`;dcpEl.className="dc-pnl "+pc(pnl_);}
    const dc24El=document.getElementById(`dc-24h-${cls}`);
    if(dc24El){dc24El.textContent=`24h ${ps(p24_)}${p24_}$`;dc24El.className="dc-24h "+pc(p24_);}

    // KPI values
    const kpiData={
      nn:{v:nn,c:""},wr:{v:wr_+"%",c:parseFloat(wr_)>=60?"kvg":parseFloat(wr_)>=50?"kvy":"kvr"},
      wl:{v:`${w}/${l}`,c:""},aw:{v:`+$${aw}`,c:"kvg"},al:{v:`$${al}`,c:"kvr"},
      best:{v:`+$${best}`,c:"kvg"},worst:{v:`$${worst}`,c:"kvr"},
      prof:{v:`+$${profSum}`,c:"kvg"},los:{v:`$${lossSum}`,c:"kvr"},
      fee:{v:`$${fee_}`,c:"kvy"},roi:{v:`${ps(roi_)}${roi_}%`,c:parseFloat(roi_)>=0?"kvg":"kvr"},
      p24:{v:`${ps(p24_)}${p24_}$`,c:parseFloat(p24_)>=0?"kvg":"kvr"},
      ep:{v:ep!==null?ep.toFixed(3):"—",c:"kvy"},xp:{v:xp!==null?xp.toFixed(3):"—",c:""},
      bp:{v:bp!==null?bp.toFixed(3):"—",c:"kvg"},mom:{v:mom!==null?mom.toFixed(2):"—",c:"kvb"},
      vel:{v:vel!==null?vel.toFixed(2):"—",c:"kvy"},vlt:{v:vlt!==null?vlt.toFixed(2):"—",c:""}
    };
    for(const[id,{v,c}] of Object.entries(kpiData)){
      const el=document.getElementById(`kv-${id}-${cls}`);
      if(el){if(el.textContent!==String(v))el.textContent=v;if(c&&el.className!==`kpi-v ${c}`)el.className=`kpi-v ${c}`;}
    }

    // Prices
    const spRows=df.filter(r=>r.start_price>1000);
    sv(`sp-last-${cls}`,spRows.length?"$"+spRows[0].start_price.toFixed(2):"—");
    sv(`ep-last-${cls}`,spRows.length&&spRows[0].end_price?"$"+spRows[0].end_price.toFixed(2):"—");
    sv(`sp-avg-${cls}`,spRows.length?"$"+(spRows.reduce((s,r)=>s+r.start_price,0)/spRows.length).toFixed(2):"—");
    sv(`ep-avg-${cls}`,spRows.filter(r=>r.end_price).length?"$"+(spRows.filter(r=>r.end_price).reduce((s,r)=>s+r.end_price,0)/spRows.filter(r=>r.end_price).length).toFixed(2):"—");
    sv(`dist-avg-${cls}`,df[0].dist!==undefined?(df.reduce((s,r)=>s+(r.dist||0),0)/nn).toFixed(2)+"$":"—");
    sv(`tl-avg-${cls}`,df[0].time_left!==undefined?(df.reduce((s,r)=>s+(r.time_left||0),0)/nn).toFixed(0)+"s":"—");

    // Zones
    const spike=zoneStats(df,["SPIKE","SPIKE_STRONG"]);
    const gold=zoneStats(df,["GOLD"]);
    const early=zoneStats(df,["EARLY"]);
    for(const[zn,zd] of [["spike",spike],["gold",gold],["early",early]]){
      sv(`z-${zn}-t-${cls}`,zd.t);sv(`z-${zn}-w-${cls}`,zd.wr+"%");
      const zpEl=document.getElementById(`z-${zn}-p-${cls}`);
      if(zpEl){zpEl.textContent=`${ps(zd.pnl)}${zd.pnl}$`;zpEl.style.color=zd.pnl>=0?"var(--glit)":"var(--rlit)";}
    }

    // Exits
    sv(`ex-tgt-${cls}`,exCount(df,"TARGET")+exCount(df,"TAKE"));
    sv(`ex-stp-${cls}`,exCount(df,"STOP"));
    sv(`ex-rev-${cls}`,exCount(df,"REVERS"));
    sv(`ex-end-${cls}`,exCount(df,"END"));

    // Mini charts
    const asc=[...df].reverse();
    const r16=parseInt(color.slice(1,3),16),g16=parseInt(color.slice(3,5),16),b16=parseInt(color.slice(5,7),16);
    const miniOpts={responsive:true,maintainAspectRatio:false,animation:{duration:0},plugins:{legend:{display:false}},
      scales:{x:{display:false},y:{grid:{color:"rgba(15,32,64,.7)"},ticks:{color:"#2a4068",font:{family:"IBM Plex Mono",size:7}}}}};
    upsertChart(`mb-${cls}`,"line",{labels:asc.map((_,i)=>i+1),datasets:[{
      data:asc.map(r=>r.balance),borderColor:color,backgroundColor:`rgba(${r16},${g16},${b16},.1)`,
      fill:true,tension:.35,pointRadius:0,borderWidth:2}]},miniOpts);
    upsertChart(`mp-${cls}`,"bar",{labels:asc.map((_,i)=>i+1),datasets:[{
      data:asc.map(r=>r.pnl||0),
      backgroundColor:asc.map(r=>(r.pnl||0)>=0?"#22c55e77":"#ef444477"),borderWidth:0,borderRadius:2}]},miniOpts);

    // Table — only rebuild if row count changed (avoids scroll reset)
    const tblEl=document.getElementById(`tbl-${cls}`);
    const bdgEl=document.getElementById(`tbl-bdg-${cls}`);
    if(bdgEl) bdgEl.textContent=nn+" rows";
    if(tblEl){
      const HIDE=new Set(["_bot","_dt","pnl"]);
      const cols=Object.keys(df[0]).filter(c=>!HIDE.has(c)&&!c.startsWith("_"));
      const currentCount=tblEl.querySelectorAll("tbody tr").length;
      if(currentCount!==Math.min(nn,60)){
        let rows="";
        df.slice(0,60).forEach(r=>{
          const res=String(r.result||"").toUpperCase(),rc=res==="WIN"?"rw":res==="LOSS"?"rl":"";
          rows+=`<tr class="${rc}">${cols.map(c=>`<td class="${tdCls(c,r[c])}">${r[c]!==undefined?r[c]:"—"}</td>`).join("")}</tr>`;
        });
        tblEl.innerHTML=`<table><thead><tr>${cols.map(c=>`<th>${c.toUpperCase().replace(/_/g," ")}</th>`).join("")}</tr></thead><tbody>${rows}</tbody></table>`;
      }
    }
  }
}

/* ─────────────────────────────────────────────
   MAIN FETCH LOOP
───────────────────────────────────────────── */
async function fetchAndPatch(){
  const dfs={};
  for(const[name,url] of Object.entries(FILES)){
    try{
      const r=await fetch(url+"?t="+Date.now());
      dfs[name]=r.ok?parseCSV(await r.text()):[];
    }catch{dfs[name]=[];}
  }
  lastDfs=dfs;
  document.getElementById("upd-time").textContent=new Date().toTimeString().slice(0,8);
  patchBanner(dfs);
  patchBotCards(dfs);
  patchRecent(dfs);
  patchCharts(dfs);
  patchDetails(dfs);
}

/* ─────────────────────────────────────────────
   INIT
───────────────────────────────────────────── */
buildSkeleton();                      // build DOM once
setInterval(updateTimer,1000);        // timer ticks silently
updateTimer();
fetchAndPatch();                      // first load
setInterval(fetchAndPatch,5000);      // patch every 5s — invisible
</script>
