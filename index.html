<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Bot Lab Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#03060e;--bg2:#070d1a;--bg3:#0b1225;
  --border:#111d35;--border2:#1a2d50;
  --text:#c8d8f0;--muted:#2a3f60;--muted2:#3d5a85;
  --amber:#f59e0b;--cyan:#06b6d4;--purple:#a855f7;
  --green:#22c55e;--green2:#4ade80;--red:#ef4444;--red2:#f87171;
  --gold:#fbbf24;--blue:#60a5fa;
  --font-head:'Syne',sans-serif;
  --font-mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-head);min-height:100vh;overflow-x:hidden}

/* BG EFFECT */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 15% 10%,rgba(245,158,11,.06) 0%,transparent 60%),
    radial-gradient(ellipse 50% 50% at 85% 85%,rgba(6,182,212,.06) 0%,transparent 60%),
    radial-gradient(ellipse 40% 60% at 50% 50%,rgba(168,85,247,.04) 0%,transparent 70%);
}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(6,182,212,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(6,182,212,.015) 1px,transparent 1px);
  background-size:48px 48px;
}
.wrap{position:relative;z-index:1;max-width:1600px;margin:0 auto;padding:20px 16px 80px}
@media(min-width:768px){.wrap{padding:32px 28px 80px}}

/* HEADER */
.header{text-align:center;margin-bottom:28px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.header-title{font-size:1.9rem;font-weight:800;letter-spacing:-.03em;
  background:linear-gradient(120deg,var(--amber),var(--cyan),var(--purple));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  display:inline-block}
@media(min-width:768px){.header-title{font-size:2.6rem}}
.header-meta{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:8px;flex-wrap:wrap}
.live-badge{display:flex;align-items:center;gap:6px;background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:99px;padding:4px 12px;font-family:var(--font-mono);font-size:.6rem;color:var(--green2);letter-spacing:.1em}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green2);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}
.header-bots{font-family:var(--font-mono);font-size:.58rem;color:var(--muted2);letter-spacing:.15em;text-transform:uppercase}
#last-update{font-family:var(--font-mono);font-size:.55rem;color:var(--muted);letter-spacing:.08em}

/* SECTION TITLE */
.section-title{font-size:.65rem;font-weight:700;color:var(--muted2);margin:28px 0 14px;display:flex;align-items:center;gap:12px;text-transform:uppercase;letter-spacing:.18em;font-family:var(--font-mono)}
.section-title::before,.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent)}

/* TIMER */
.timer-card{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:16px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:18px;flex-wrap:wrap;position:relative;overflow:hidden}
.timer-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--amber),var(--cyan),var(--purple),var(--amber));background-size:300%;animation:flowbg 4s linear infinite}
@keyframes flowbg{0%{background-position:0%}100%{background-position:300%}}
.t-item{display:flex;flex-direction:column;align-items:center;min-width:60px}
.t-lbl{font-family:var(--font-mono);font-size:.48rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.t-val{font-size:1.35rem;font-weight:800;color:var(--text);line-height:1}
.t-val.c{color:var(--cyan)}.t-val.g{color:var(--green2)}.t-val.y{color:var(--amber)}.t-val.r{color:var(--red2)}
.t-div{width:1px;height:30px;background:var(--border);flex-shrink:0}
.t-prog{flex:1;min-width:160px}
.t-prog-lbl{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:.48rem;color:var(--muted);margin-bottom:6px}
.t-prog-bg{background:var(--border);border-radius:99px;height:4px;overflow:hidden}
.t-prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--cyan),var(--purple));transition:width 1s linear}

/* GLOBAL BANNER */
.global-banner{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:18px;padding:22px;margin-bottom:20px;position:relative;overflow:hidden}
.global-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--amber),var(--cyan),var(--purple),var(--amber));background-size:300%;animation:flowbg 4s linear infinite}
.gb-top{display:grid;grid-template-columns:auto 1fr;gap:20px;margin-bottom:18px;align-items:start}
@media(max-width:500px){.gb-top{grid-template-columns:1fr}}
.gb-bal-block .gb-lbl{font-family:var(--font-mono);font-size:.55rem;color:var(--muted);text-transform:uppercase;letter-spacing:.15em;margin-bottom:4px}
.gb-big{font-size:2.8rem;font-weight:800;letter-spacing:-.04em;color:#fff;line-height:1}
.gb-pnl{font-size:.9rem;margin-top:4px;font-weight:700}
.gb-pnl.pos{color:var(--green2)}.gb-pnl.neg{color:var(--red2)}
.gb-24h-block{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.gb-24h-card{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:12px;padding:10px 12px;display:flex;justify-content:space-between;align-items:center}
.gb-24h-lbl{font-family:var(--font-mono);font-size:.52rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.gb-24h-val{font-size:1.1rem;font-weight:800}
.gb-24h-val.pos{color:var(--green2)}.gb-24h-val.neg{color:var(--red2)}.gb-24h-val.neu{color:var(--muted2)}
.gb-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
@media(min-width:600px){.gb-stats{grid-template-columns:repeat(8,1fr)}}
.gb-stat{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:10px;padding:8px;text-align:center}
.gb-stat-l{font-family:var(--font-mono);font-size:.48rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.gb-stat-v{font-size:.95rem;font-weight:700;color:var(--text)}
.gb-stat-v.green{color:var(--green2)}.gb-stat-v.red{color:var(--red2)}.gb-stat-v.gold{color:var(--gold)}.gb-stat-v.cyan{color:var(--cyan)}
.gb-wr-wrap{margin-top:2px}
.gb-wr-lbl{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:.5rem;color:var(--muted);margin-bottom:6px}
.gb-wr-bg{background:var(--border);border-radius:99px;height:5px;overflow:hidden}
.gb-wr-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--green),var(--green2));transition:width .8s cubic-bezier(.4,0,.2,1)}

/* BOT CARDS */
.bots-grid{display:grid;grid-template-columns:1fr;gap:14px;margin-bottom:4px}
@media(min-width:640px){.bots-grid{grid-template-columns:repeat(3,1fr)}}
.bot-card{border-radius:16px;border:1px solid var(--border);padding:18px;position:relative;overflow:hidden;transition:border-color .3s,box-shadow .3s}
.bot-card:hover{border-color:var(--border2);box-shadow:0 0 30px rgba(0,0,0,.3)}
.bot-card.test{background:linear-gradient(160deg,var(--bg2),#150e00)}.bot-card.test::before{background:var(--amber)}
.bot-card.test1{background:linear-gradient(160deg,var(--bg2),#001520)}.bot-card.test1::before{background:var(--cyan)}
.bot-card.test99{background:linear-gradient(160deg,var(--bg2),#130015)}.bot-card.test99::before{background:var(--purple)}
.bot-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:16px 16px 0 0}
.bot-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.bot-name{font-family:var(--font-mono);font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;font-weight:500;display:flex;align-items:center;gap:7px}
.bot-status{font-family:var(--font-mono);font-size:.5rem;padding:3px 8px;border-radius:4px;letter-spacing:.06em;background:rgba(255,255,255,.04);border:1px solid var(--border2)}
.bot-balance{font-size:2rem;font-weight:800;letter-spacing:-.04em;color:#fff;line-height:1;margin-bottom:3px}
.bot-pnl{font-size:.75rem;font-weight:700;margin-bottom:8px}
.bot-pnl.pos{color:var(--green2)}.bot-pnl.neg{color:var(--red2)}
.bot-24h{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;padding:6px 10px;display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.bot-24h-lbl{font-family:var(--font-mono);font-size:.48rem;color:var(--muted);text-transform:uppercase}
.bot-24h-v{font-size:.88rem;font-weight:700}
.bot-24h-v.pos{color:var(--green2)}.bot-24h-v.neg{color:var(--red2)}.bot-24h-v.neu{color:var(--muted2)}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:5px}
.stat-row2{display:grid;grid-template-columns:repeat(2,1fr);gap:5px;margin-bottom:10px}
.stat-b{background:rgba(0,0,0,.25);border-radius:8px;padding:6px 8px;text-align:center;border:1px solid var(--border)}
.stat-bl{font-family:var(--font-mono);font-size:.46rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px}
.stat-bv{font-size:.88rem;font-weight:600;color:#94a3b8}
.stat-bv.green{color:var(--green2)}.stat-bv.red{color:var(--red2)}.stat-bv.gold{color:var(--gold)}.stat-bv.cyan{color:var(--cyan)}
.wr-bg{background:var(--border);border-radius:4px;height:3px;overflow:hidden}
.wr-fill{height:100%;border-radius:4px;transition:width .6s}
.bot-card.test .wr-fill{background:linear-gradient(90deg,var(--amber),#fde68a)}
.bot-card.test1 .wr-fill{background:linear-gradient(90deg,var(--cyan),#a5f3fc)}
.bot-card.test99 .wr-fill{background:linear-gradient(90deg,var(--purple),#d8b4fe)}

/* RECENT PILLS */
.recent-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:4px}
@media(min-width:600px){.recent-grid{grid-template-columns:repeat(10,1fr)}}
.pill{border:1px solid var(--border);border-radius:10px;padding:8px 5px;text-align:center;cursor:default;transition:transform .15s}
.pill:hover{transform:translateY(-2px)}
.pill.win{border-color:rgba(74,222,128,.25);background:linear-gradient(160deg,var(--bg2),#021508)}
.pill.loss{border-color:rgba(239,68,68,.25);background:linear-gradient(160deg,var(--bg2),#160203)}
.pill-bot{font-family:var(--font-mono);font-size:.48rem;margin-bottom:3px}
.pill-res{font-size:.68rem;font-weight:800;letter-spacing:.04em}
.pill.win .pill-res{color:var(--green2)}.pill.loss .pill-res{color:var(--red2)}
.pill-pnl{font-size:.56rem;margin-top:2px;font-weight:600}
.pill.win .pill-pnl{color:#86efac}.pill.loss .pill-pnl{color:#fca5a5}
.pill-time{font-family:var(--font-mono);font-size:.5rem;color:var(--muted);margin-top:3px;border-top:1px solid var(--border);padding-top:3px}
.pill-zone{font-family:var(--font-mono);font-size:.44rem;margin-top:2px}

/* CHARTS */
.charts-main{display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:4px}
@media(min-width:900px){.charts-main{grid-template-columns:2fr 1fr}}
.charts-sub{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.chart-card{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:16px;padding:16px;position:relative;overflow:hidden}
.chart-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent)}
.chart-lbl{font-family:var(--font-mono);font-size:.58rem;color:var(--muted2);text-transform:uppercase;letter-spacing:.12em;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.chart-card canvas{display:block}

/* DETAIL CARDS */
.detail-grid{display:grid;grid-template-columns:1fr;gap:16px}
@media(min-width:900px){.detail-grid{grid-template-columns:repeat(3,1fr)}}
.detail-card{border-radius:16px;border:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column;background:var(--bg2)}
.detail-card.test{background:linear-gradient(170deg,var(--bg2),#130d00)}
.detail-card.test1{background:linear-gradient(170deg,var(--bg2),#001318)}
.detail-card.test99{background:linear-gradient(170deg,var(--bg2),#0e0014)}
.dc-header{padding:16px 18px;border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.dc-header::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;animation:shimmer 3s linear infinite;background-size:200%}
.detail-card.test .dc-header::after{background:linear-gradient(90deg,var(--amber),#fde68a,var(--amber))}
.detail-card.test1 .dc-header::after{background:linear-gradient(90deg,var(--cyan),#a5f3fc,var(--cyan))}
.detail-card.test99 .dc-header::after{background:linear-gradient(90deg,var(--purple),#d8b4fe,var(--purple))}
@keyframes shimmer{0%{background-position:-200%}100%{background-position:200%}}
.dc-head-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.dc-title{font-size:1.05rem;font-weight:800;color:#fff}
.dc-sub{font-family:var(--font-mono);font-size:.48rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-top:3px}
.dc-bal-block{text-align:right}
.dc-bal-lbl{font-family:var(--font-mono);font-size:.46rem;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px}
.dc-bal-val{font-size:1.55rem;font-weight:800;letter-spacing:-.03em;color:#fff;line-height:1}
.dc-bal-pnl{font-family:var(--font-mono);font-size:.7rem;font-weight:700;margin-top:2px}
.dc-bal-pnl.pos{color:var(--green2)}.dc-bal-pnl.neg{color:var(--red2)}
.dc-24h{font-family:var(--font-mono);font-size:.6rem;margin-top:1px}
.dc-24h.pos{color:var(--green2)}.dc-24h.neg{color:var(--red2)}

/* KPI GRID */
.kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:10px 12px;border-bottom:1px solid var(--border)}
.kpi{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:7px;padding:6px 7px;text-align:center}
.kpi-l{font-family:var(--font-mono);font-size:.42rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.kpi-v{font-size:.82rem;font-weight:700;color:var(--text)}
.kpi-v.g{color:var(--green2)}.kpi-v.r{color:var(--red2)}.kpi-v.y{color:var(--gold)}
.kpi-v.b{color:var(--blue)}.kpi-v.a{color:var(--amber)}.kpi-v.c{color:var(--cyan)}.kpi-v.p{color:var(--purple)}

/* PRICE ROW */
.price-row{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:10px 12px;border-bottom:1px solid var(--border)}
.price-box{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:7px;padding:7px 8px;text-align:center}
.price-box-l{font-family:var(--font-mono);font-size:.42rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.price-box-v{font-size:.8rem;font-weight:700}

/* ZONES */
.zone-row{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;padding:10px 12px;border-bottom:1px solid var(--border)}
.zone-pill{border-radius:8px;padding:9px 6px;text-align:center;border:1px solid}
.zone-pill.spike{background:rgba(245,158,11,.05);border-color:rgba(245,158,11,.2)}
.zone-pill.goldz{background:rgba(250,204,21,.05);border-color:rgba(250,204,21,.2)}
.zone-pill.lockz{background:rgba(16,185,129,.05);border-color:rgba(16,185,129,.2)}
.zone-name{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.zone-pill.spike .zone-name{color:var(--amber)}.zone-pill.goldz .zone-name{color:#facc15}.zone-pill.lockz .zone-name{color:#10b981}
.z-stats{display:flex;justify-content:center;gap:8px}
.zs{text-align:center}.zs-l{font-family:var(--font-mono);font-size:.4rem;color:var(--muted);text-transform:uppercase}.zs-v{font-size:.74rem;font-weight:700;color:#94a3b8}

/* EXIT ROW */
.exit-row{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;padding:10px 12px;border-bottom:1px solid var(--border)}
.exit-pill{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:8px;padding:8px 4px;text-align:center}
.exit-icon{font-size:.88rem;margin-bottom:3px}
.exit-lbl{font-family:var(--font-mono);font-size:.4rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.exit-val{font-size:.95rem;font-weight:800;margin-top:2px}
.exit-sub{font-family:var(--font-mono);font-size:.4rem;color:var(--muted);margin-top:1px}
.exit-val.g{color:var(--green2)}.exit-val.r{color:var(--red2)}.exit-val.y{color:var(--gold)}.exit-val.c{color:var(--cyan)}

/* MINI CHARTS */
.mini-chart-wrap{padding:10px 12px;border-bottom:1px solid var(--border)}
.mini-chart-lbl{font-family:var(--font-mono);font-size:.5rem;color:var(--muted2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.mini-chart-wrap canvas{display:block;max-height:80px}

/* TABLE */
.tbl-header{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.tbl-title{font-size:.76rem;font-weight:700;color:var(--text)}
.tbl-badge{font-family:var(--font-mono);font-size:.5rem;color:var(--muted);background:var(--border);padding:2px 8px;border-radius:99px}
.tbl-wrap{overflow-x:auto;max-height:240px;overflow-y:auto}
table{width:100%;border-collapse:collapse;min-width:700px}
thead tr{background:var(--bg);position:sticky;top:0;z-index:2}
th{font-family:var(--font-mono);font-size:6.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:5px 6px;border-bottom:1px solid var(--border);text-align:center;white-space:nowrap;font-weight:400}
td{font-family:var(--font-mono);font-size:7.5px;text-align:center;color:#4d6a8a;padding:4px 6px;border-bottom:1px solid rgba(17,29,53,.6);white-space:nowrap}
tbody tr:hover td{background:rgba(255,255,255,.015)}
tr.r-win td{background:rgba(34,197,94,.04)}tr.r-loss td{background:rgba(239,68,68,.04)}
td.tw{color:var(--green);font-weight:700}td.tl{color:var(--red);font-weight:700}
td.tp{color:var(--green2);font-weight:700}td.tn{color:var(--red2);font-weight:700}
td.tspike{color:var(--amber);font-weight:700}td.tgold{color:#facc15;font-weight:700}td.tlock{color:#10b981;font-weight:700}
td.ttgt{color:var(--green2);font-weight:700}td.ttrail{color:#a3e635;font-weight:700}
td.tstop{color:var(--red2);font-weight:700}td.trev{color:var(--gold);font-weight:700}
td.tend{color:var(--muted)}td.tsafe{color:var(--blue)}
.empty{color:var(--muted);text-align:center;padding:32px;font-size:.75rem;font-family:var(--font-mono)}

/* SCROLL */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* FADE IN */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.bot-card,.global-banner,.timer-card{animation:fadeUp .5s ease both}
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <div class="header">
    <div class="header-title">⚗️ Bot Lab Dashboard</div>
    <div class="header-meta">
      <div class="live-badge"><div class="live-dot"></div>LIVE</div>
      <div class="header-bots">TEST · TEST1 · TEST99</div>
      <div id="last-update">—</div>
    </div>
  </div>

  <!-- TIMER -->
  <div id="timer_bar"></div>

  <!-- GLOBAL BANNER -->
  <div id="global_banner"></div>

  <!-- BOT CARDS -->
  <div class="section-title">📊 Bot Overview</div>
  <div id="bots_row" class="bots-grid"></div>

  <!-- RECENT -->
  <div class="section-title">⚡ Recent Activity</div>
  <div id="recent"></div>

  <!-- CHARTS -->
  <div class="section-title">📈 Charts & Analytics</div>
  <div class="charts-main">
    <div class="chart-card">
      <div class="chart-lbl">
        <span>Balance Curves</span>
        <span style="font-size:.48rem;color:var(--muted)">per trade index</span>
      </div>
      <canvas id="chart_balance" height="180"></canvas>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div class="chart-card" style="flex:1">
        <div class="chart-lbl">Profit vs Loss</div>
        <canvas id="chart_pnl" height="120"></canvas>
      </div>
      <div class="chart-card" style="flex:1">
        <div class="chart-lbl">Win Rate %</div>
        <canvas id="chart_wr" height="120"></canvas>
      </div>
    </div>
  </div>

  <!-- PNL OVER TIME -->
  <div class="charts-main" style="margin-top:12px">
    <div class="chart-card">
      <div class="chart-lbl">Cumulative P&L Over Time</div>
      <canvas id="chart_cpnl" height="140"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-lbl">Trade P&L Distribution</div>
      <canvas id="chart_dist" height="140"></canvas>
    </div>
  </div>

  <!-- DETAILS -->
  <div class="section-title">🔬 Bot Analysis</div>
  <div id="details" class="detail-grid"></div>

</div><!-- /wrap -->

<script>
const FILES = {
  Test:   "https://raw.githubusercontent.com/gutu99/bot-dashboard/main/Test.csv",
  Test1:  "https://raw.githubusercontent.com/gutu99/bot-dashboard/main/Test1.csv",
  Test99: "https://raw.githubusercontent.com/gutu99/bot-dashboard/main/Test99.csv"
};
const COLORS = { Test:"#f59e0b", Test1:"#06b6d4", Test99:"#a855f7" };
const ICONS  = { Test:"🔬", Test1:"⚗️", Test99:"🧬" };
const SEED   = 100;
let charts   = {};

/* ── CSV ── */
function parseCSV(text) {
  const lines = text.trim().split("\n");
  if (lines.length < 2) return [];
  const headers = lines[0].split(",").map(h => h.trim().replace(/\r/g,""));
  return lines.slice(1).map(line => {
    const vals = line.split(",");
    const obj = {};
    headers.forEach((h, i) => {
      const v = (vals[i]||"").trim().replace(/\r/g,"");
      obj[h] = v !== "" && !isNaN(v) ? parseFloat(v) : v;
    });
    // derived: pnl = pnl_net, start_price exists, end_price = start_price + dist
    obj.pnl = obj.pnl_net !== undefined ? obj.pnl_net : (obj.pnl || 0);
    if (obj.start_price !== undefined && obj.dist !== undefined)
      obj.end_price = Math.round((obj.start_price + obj.dist) * 100) / 100;
    return obj;
  }).filter(r => Object.keys(r).length > 1).reverse(); // newest first
}

function ps(v) { return v >= 0 ? "+" : ""; }
function pc(v) { return v >= 0 ? "pos" : "neg"; }
function fmt(v, dec=2) { return isNaN(v) ? "—" : parseFloat(v).toFixed(dec); }
function pct(w, t) { return t ? (w/t*100).toFixed(1) : "0.0"; }

function parseDT(r) {
  if (r.date && r.time) {
    const d = new Date(`${r.date}T${r.time}`);
    if (!isNaN(d)) return d;
  }
  return null;
}
function p24h(rows) {
  const cut = Date.now() - 86400000;
  return Math.round(rows.filter(r => {
    const dt = parseDT(r); return dt && dt.getTime() >= cut;
  }).reduce((s,r) => s + (r.pnl||0), 0) * 100) / 100;
}

/* ── TIMER ── */
function updateTimer() {
  const now = new Date();
  const ts  = Math.floor(now.getTime()/1000);
  const tl  = 300 - (ts % 300);
  const pct_ = ((300-tl)/300*100).toFixed(1);
  const col  = tl > 60 ? "g" : tl > 20 ? "y" : "r";
  const mm   = Math.floor(tl/60), ss = String(tl%60).padStart(2,"0");
  document.getElementById("timer_bar").innerHTML = `
  <div class="timer-card">
    <div class="t-item"><div class="t-lbl">🕐 Ora</div><div class="t-val c">${now.toTimeString().slice(0,8)}</div></div>
    <div class="t-div"></div>
    <div class="t-item"><div class="t-lbl">⏱ Rundă</div><div class="t-val ${col}">${mm}:${ss}</div></div>
    <div class="t-div"></div>
    <div class="t-item"><div class="t-lbl">📅 Data</div><div class="t-val" style="font-size:1rem">${now.toLocaleDateString("ro-RO")}</div></div>
    <div class="t-div"></div>
    <div class="t-prog">
      <div class="t-prog-lbl"><span>Progres rundă</span><span>${pct_}%</span></div>
      <div class="t-prog-bg"><div class="t-prog-fill" style="width:${pct_}%"></div></div>
    </div>
  </div>`;
}

/* ── CHART FACTORY ── */
const CPL = {
  responsive:true, maintainAspectRatio:false,
  plugins:{ legend:{ labels:{ color:"#3d5a85", font:{ family:"DM Mono", size:9 } } } },
  scales:{
    x:{ grid:{color:"rgba(17,29,53,.8)"}, ticks:{color:"#2a3f60",font:{family:"DM Mono",size:8}} },
    y:{ grid:{color:"rgba(17,29,53,.8)"}, ticks:{color:"#2a3f60",font:{family:"DM Mono",size:8}} }
  }
};
function mkChart(id, cfg) {
  if (charts[id]) charts[id].destroy();
  const c = document.getElementById(id);
  if (c) charts[id] = new Chart(c, cfg);
}

/* ── MAIN ── */
async function update() {
  const dfs = {};
  for (const [name, url] of Object.entries(FILES)) {
    try {
      const r = await fetch(url + "?t=" + Date.now());
      dfs[name] = r.ok ? parseCSV(await r.text()) : [];
    } catch { dfs[name] = []; }
  }
  document.getElementById("last-update").textContent =
    "↻ " + new Date().toTimeString().slice(0,8);
  renderBanner(dfs);
  renderBotCards(dfs);
  renderRecent(dfs);
  renderGlobalCharts(dfs);
  renderDetails(dfs);
}

/* ── BANNER ── */
function renderBanner(dfs) {
  const frames = Object.values(dfs).filter(d => d.length > 0);
  if (!frames.length) {
    document.getElementById("global_banner").innerHTML =
      `<div class="global-banner"><div class="empty">Nicio dată disponibilă</div></div>`; return;
  }
  const all  = frames.flat();
  const bal  = frames.reduce((s,d) => s + (d[0]?.balance||0), 0);
  const pnl  = Math.round((bal - SEED*frames.length)*100)/100;
  const nn   = all.length;
  const w    = all.filter(r => r.result==="WIN").length;
  const l    = all.filter(r => r.result==="LOSS").length;
  const wr   = pct(w,nn);
  const prof = Math.round(all.filter(r=>r.pnl>0).reduce((s,r)=>s+r.pnl,0)*100)/100;
  const losv = Math.round(all.filter(r=>r.pnl<0).reduce((s,r)=>s+r.pnl,0)*100)/100;
  const fee  = Math.round(all.reduce((s,r)=>s+(r.fee||0),0)*100)/100;
  const p24  = frames.reduce((s,d)=>s+p24h(d),0);
  const p24f = Math.round(p24*100)/100;
  const bestTrade = Math.max(...all.map(r=>r.pnl||0)).toFixed(3);
  const worstTrade= Math.min(...all.map(r=>r.pnl||0)).toFixed(3);
  const avgW = w ? (all.filter(r=>r.pnl>0).reduce((s,r)=>s+r.pnl,0)/w).toFixed(3) : "0";
  const avgL = l ? (all.filter(r=>r.pnl<0).reduce((s,r)=>s+r.pnl,0)/l).toFixed(3) : "0";
  const wrCls = wr>=60?"green":wr>=50?"gold":"red";
  const roi  = ((bal - SEED*frames.length)/(SEED*frames.length)*100).toFixed(1);
  document.getElementById("global_banner").innerHTML = `
  <div class="global-banner">
    <div class="gb-top">
      <div class="gb-bal-block">
        <div class="gb-lbl">🧪 Total Balance</div>
        <div class="gb-big">$${bal.toFixed(2)}</div>
        <div class="gb-pnl ${pc(pnl)}">${ps(pnl)}${pnl}$ all time &nbsp;|&nbsp; ROI ${ps(roi)}${roi}%</div>
      </div>
      <div class="gb-24h-block">
        <div class="gb-24h-card">
          <div><div class="gb-24h-lbl">📅 24h P&L</div><div style="font-size:.44rem;color:var(--muted)">toate boturile</div></div>
          <div class="gb-24h-val ${pc(p24f)}">${ps(p24f)}${p24f}$</div>
        </div>
        <div class="gb-24h-card">
          <div><div class="gb-24h-lbl">🔄 Bots activi</div></div>
          <div class="gb-24h-val neu">${frames.length}/3</div>
        </div>
      </div>
    </div>
    <div class="gb-stats">
      <div class="gb-stat"><div class="gb-stat-l">Trades</div><div class="gb-stat-v">${nn}</div></div>
      <div class="gb-stat"><div class="gb-stat-l">Win%</div><div class="gb-stat-v ${wrCls}">${wr}%</div></div>
      <div class="gb-stat"><div class="gb-stat-l">Profit</div><div class="gb-stat-v green">+$${prof}</div></div>
      <div class="gb-stat"><div class="gb-stat-l">Loss</div><div class="gb-stat-v red">$${losv}</div></div>
      <div class="gb-stat"><div class="gb-stat-l">Wins</div><div class="gb-stat-v green">${w}</div></div>
      <div class="gb-stat"><div class="gb-stat-l">Losses</div><div class="gb-stat-v red">${l}</div></div>
      <div class="gb-stat"><div class="gb-stat-l">Fees</div><div class="gb-stat-v gold">$${fee}</div></div>
      <div class="gb-stat"><div class="gb-stat-l">Net PnL</div><div class="gb-stat-v ${pc(pnl)}">${ps(pnl)}${pnl}$</div></div>
      <div class="gb-stat"><div class="gb-stat-l">Avg Win</div><div class="gb-stat-v green">+$${avgW}</div></div>
      <div class="gb-stat"><div class="gb-stat-l">Avg Loss</div><div class="gb-stat-v red">$${avgL}</div></div>
      <div class="gb-stat"><div class="gb-stat-l">Best</div><div class="gb-stat-v green">+$${bestTrade}</div></div>
      <div class="gb-stat"><div class="gb-stat-l">Worst</div><div class="gb-stat-v red">$${worstTrade}</div></div>
    </div>
    <div class="gb-wr-wrap">
      <div class="gb-wr-lbl"><span>Global Win Rate</span><span style="color:${wr>=60?"#4ade80":wr>=50?"#fbbf24":"#f87171"}">${wr}%</span></div>
      <div class="gb-wr-bg"><div class="gb-wr-fill" style="width:${wr}%"></div></div>
    </div>
  </div>`;
}

/* ── BOT CARDS ── */
function renderBotCards(dfs) {
  const el = document.getElementById("bots_row"); el.innerHTML = "";
  for (const [name, df] of Object.entries(dfs)) {
    const cls = name.toLowerCase(), color = COLORS[name], icon = ICONS[name];
    if (!df.length) {
      el.innerHTML += `<div class="bot-card ${cls}"><div class="bot-top"><div class="bot-name" style="color:${color}">${icon} ${name}</div></div><div class="empty">Nicio tranzacție</div></div>`; continue;
    }
    const bal  = df[0].balance||0, pnl = Math.round((bal-SEED)*100)/100;
    const nn   = df.length;
    const w    = df.filter(r=>r.result==="WIN").length, l=df.filter(r=>r.result==="LOSS").length;
    const wr   = pct(w,nn);
    const prof = Math.round(df.filter(r=>r.pnl>0).reduce((s,r)=>s+r.pnl,0)*100)/100;
    const losv = Math.round(df.filter(r=>r.pnl<0).reduce((s,r)=>s+r.pnl,0)*100)/100;
    const fee  = Math.round(df.reduce((s,r)=>s+(r.fee||0),0)*100)/100;
    const roi  = ((bal-SEED)/SEED*100).toFixed(1);
    const p24  = p24h(df).toFixed(2);
    const wrC  = wr>=60?"green":wr>=50?"gold":"red";
    el.innerHTML += `
    <div class="bot-card ${cls}">
      <div class="bot-top">
        <div class="bot-name" style="color:${color}">${icon} ${name}</div>
        <div class="bot-status" style="color:${color};border-color:${color}40">LIVE</div>
      </div>
      <div class="bot-balance">$${bal.toFixed(2)}</div>
      <div class="bot-pnl ${pc(pnl)}">${ps(pnl)}${pnl}$ &nbsp;·&nbsp; ROI ${ps(roi)}${roi}%</div>
      <div class="bot-24h"><div class="bot-24h-lbl">📅 Profit 24h</div><div class="bot-24h-v ${pc(p24)}">${ps(p24)}${p24}$</div></div>
      <div class="stat-row">
        <div class="stat-b"><div class="stat-bl">Trades</div><div class="stat-bv">${nn}</div></div>
        <div class="stat-b"><div class="stat-bl">Win%</div><div class="stat-bv ${wrC}">${wr}%</div></div>
        <div class="stat-b"><div class="stat-bl">W/L</div><div class="stat-bv">${w}/${l}</div></div>
      </div>
      <div class="stat-row2">
        <div class="stat-b"><div class="stat-bl">Profit</div><div class="stat-bv green">+$${prof}</div></div>
        <div class="stat-b"><div class="stat-bl">Loss</div><div class="stat-bv red">$${losv}</div></div>
        <div class="stat-b"><div class="stat-bl">Fees</div><div class="stat-bv gold">$${fee}</div></div>
        <div class="stat-b"><div class="stat-bl">Net</div><div class="stat-bv ${pnl>=0?"green":"red"}">${ps(pnl)}${pnl}$</div></div>
      </div>
      <div class="wr-bg"><div class="wr-fill" style="width:${wr}%"></div></div>
    </div>`;
  }
}

/* ── RECENT ── */
function renderRecent(dfs) {
  const all = [];
  for (const [name, df] of Object.entries(dfs))
    df.forEach(r => all.push({...r, _bot:name, _dt:parseDT(r)}));
  all.sort((a,b) => {
    if (!a._dt && !b._dt) return 0;
    if (!a._dt) return 1; if (!b._dt) return -1;
    return b._dt - a._dt;
  });
  const top = all.slice(0, 10);
  if (!top.length) { document.getElementById("recent").innerHTML=`<div class="empty">Nicio activitate</div>`; return; }
  let html = `<div class="recent-grid">`;
  top.forEach(r => {
    const res   = String(r.result||"?").toUpperCase();
    const pnlv  = r.pnl || 0;
    const bot   = r._bot, color = COLORS[bot], icon = ICONS[bot];
    const ts    = r._dt ? r._dt.toTimeString().slice(0,5) : "—";
    const zone  = r.zone || r.bet_zone || "";
    const zColor= zone.toUpperCase()==="SPIKE"?"#f59e0b":zone.toUpperCase()==="GOLD"?"#facc15":"#10b981";
    const cls   = res==="WIN"?"win":"loss";
    const et    = String(r.exit_type||r.exit||"").toUpperCase();
    html += `<div class="pill ${cls}">
      <div class="pill-bot" style="color:${color}">${icon} ${bot}</div>
      <div class="pill-res">${res}</div>
      <div class="pill-pnl">${ps(pnlv)}${pnlv.toFixed(2)}$</div>
      <div class="pill-time">${ts}</div>
      ${zone?`<div class="pill-zone" style="color:${zColor}">${zone}</div>`:""}
    </div>`;
  });
  document.getElementById("recent").innerHTML = html + `</div>`;
}

/* ── GLOBAL CHARTS ── */
function renderGlobalCharts(dfs) {
  // Balance curves
  const balDS = [];
  for (const [name, df] of Object.entries(dfs)) {
    if (!df.length) continue;
    const asc = [...df].reverse();
    balDS.push({ label:name, data:asc.map((r,i)=>({x:i+1,y:r.balance})),
      borderColor:COLORS[name], backgroundColor:COLORS[name]+"15",
      fill:true, tension:.35, pointRadius:0, borderWidth:2 });
  }
  mkChart("chart_balance", { type:"line", data:{datasets:balDS},
    options:{...CPL, parsing:false, maintainAspectRatio:false} });

  // Profit vs Loss
  const names = Object.keys(dfs).filter(n=>dfs[n].length>0);
  mkChart("chart_pnl", { type:"bar",
    data:{ labels:names, datasets:[
      { label:"Profit", data:names.map(n=>Math.round(dfs[n].filter(r=>r.pnl>0).reduce((s,r)=>s+r.pnl,0)*100)/100), backgroundColor:"#22c55e99", borderColor:"#4ade80", borderWidth:1, borderRadius:4 },
      { label:"Loss",   data:names.map(n=>Math.round(dfs[n].filter(r=>r.pnl<0).reduce((s,r)=>s+r.pnl,0)*100)/100), backgroundColor:"#ef444499", borderColor:"#f87171", borderWidth:1, borderRadius:4 }
    ]}, options:{...CPL, maintainAspectRatio:false} });

  // Win Rate
  mkChart("chart_wr", { type:"bar",
    data:{ labels:names, datasets:[{
      label:"Win Rate %",
      data:names.map(n=>{ const d=dfs[n]; return d.length?parseFloat(pct(d.filter(r=>r.result==="WIN").length,d.length)):0; }),
      backgroundColor:names.map(n=>COLORS[n]+"bb"),
      borderColor:names.map(n=>COLORS[n]),
      borderWidth:1, borderRadius:4
    }]}, options:{...CPL, maintainAspectRatio:false, scales:{...CPL.scales,y:{...CPL.scales.y,min:0,max:100}}} });

  // Cumulative PnL per trade
  const cpnlDS = [];
  for (const [name, df] of Object.entries(dfs)) {
    if (!df.length) continue;
    const asc = [...df].reverse();
    let cum = 0;
    cpnlDS.push({ label:name, data:asc.map(r=>{ cum+=r.pnl||0; return Math.round(cum*100)/100; }),
      borderColor:COLORS[name], backgroundColor:"transparent",
      fill:false, tension:.3, pointRadius:0, borderWidth:2 });
  }
  mkChart("chart_cpnl", { type:"line", data:{ datasets:cpnlDS.map((d,i)=>({...d,labels:undefined})) },
    options:{...CPL, maintainAspectRatio:false, parsing:false,
      datasets:{ line:{ data: cpnlDS.map(d=>d.data.map((v,i)=>({x:i+1,y:v}))) } }
    }
  });
  // rebuild correctly
  if(charts["chart_cpnl"]) charts["chart_cpnl"].destroy();
  const cpnlEl = document.getElementById("chart_cpnl");
  if(cpnlEl) {
    const datasets2 = [];
    for(const[name,df] of Object.entries(dfs)){
      if(!df.length)continue;
      const asc=[...df].reverse(); let cum=0;
      datasets2.push({label:name,data:asc.map((r,i)=>{cum+=(r.pnl||0);return{x:i+1,y:Math.round(cum*100)/100};}),
        borderColor:COLORS[name],backgroundColor:COLORS[name]+"10",fill:true,tension:.35,pointRadius:0,borderWidth:2});
    }
    charts["chart_cpnl"]=new Chart(cpnlEl,{type:"line",data:{datasets:datasets2},options:{...CPL,parsing:false,maintainAspectRatio:false}});
  }

  // Distribution
  const allPnls = Object.values(dfs).flat().map(r=>r.pnl||0).filter(v=>v!==0);
  if(allPnls.length) {
    const min=Math.floor(Math.min(...allPnls)*10)/10, max=Math.ceil(Math.max(...allPnls)*10)/10;
    const step=0.2, bins=[]; let b=min;
    while(b<=max){bins.push(Math.round(b*10)/10);b=Math.round((b+step)*10)/10;}
    const counts=bins.map(b=>allPnls.filter(v=>v>=b&&v<b+step).length);
    const bgColors=bins.map(b=>b>=0?"#22c55e88":"#ef444488");
    mkChart("chart_dist",{type:"bar",data:{labels:bins.map(b=>b.toFixed(1)),datasets:[{label:"Trades",data:counts,backgroundColor:bgColors,borderWidth:0,borderRadius:3}]},options:{...CPL,maintainAspectRatio:false}});
  }
}

/* ── DETAIL CARDS ── */
function avgOf(df, key) {
  if (!df.length || df[0][key] === undefined) return "—";
  const v = df.reduce((s,r)=>s+(parseFloat(r[key])||0),0)/df.length;
  return isNaN(v) ? "—" : v.toFixed(3);
}
function zoneStats(df, z) {
  const col = ["zone","bet_zone"].find(c=>df.length&&df[0][c]!==undefined);
  if (!col) return {t:0,wr:"0.0",pnl:0};
  const sub = df.filter(r=>String(r[col]||"").toUpperCase()===z.toUpperCase());
  const t=sub.length, w=sub.filter(r=>r.result==="WIN").length;
  return {t, wr:pct(w,t), pnl:Math.round(sub.reduce((s,r)=>s+(r.pnl||0),0)*100)/100};
}
function exCount(df, s) {
  const col = ["exit_type","exit"].find(c=>df.length&&df[0][c]!==undefined);
  if (!col) return 0;
  return df.filter(r=>String(r[col]||"").toUpperCase().includes(s.toUpperCase())).length;
}
function tdClass(col, val, res) {
  if(col==="result") return String(val).toUpperCase()==="WIN"?"tw":"tl";
  if(col==="pnl_net"||col==="pnl_gross"||col==="pnl") return val>0?"tp":val<0?"tn":"";
  if(col==="zone"||col==="bet_zone"){const u=String(val||"").toUpperCase();return u==="SPIKE"?"tspike":u==="GOLD"?"tgold":u==="LOCK"?"tlock":"";}
  if(col==="exit_type"||col==="exit"){const u=String(val||"").toUpperCase();return u.includes("TARGET")||u.includes("TAKE")?"ttgt":u.includes("TRAIL")?"ttrail":u.includes("STOP")?"tstop":u.includes("REVERS")?"trev":u.includes("END")?"tend":u.includes("SAFETY")?"tsafe":"";}
  return "";
}

function renderDetails(dfs) {
  const el = document.getElementById("details"); el.innerHTML = "";
  for (const [name, df] of Object.entries(dfs)) {
    const cls=name.toLowerCase(), color=COLORS[name], icon=ICONS[name];
    if (!df.length) {
      el.innerHTML += `<div class="detail-card ${cls}"><div class="dc-header"><div class="dc-head-row"><div><div class="dc-title" style="color:${color}">${icon} ${name}</div><div class="dc-sub">Așteptând date...</div></div></div></div></div>`; continue;
    }
    const bal=df[0].balance||0, pnl=Math.round((bal-SEED)*100)/100, nn=df.length;
    const w=df.filter(r=>r.result==="WIN").length, l=df.filter(r=>r.result==="LOSS").length;
    const wr=pct(w,nn);
    const wins=df.filter(r=>r.pnl>0), losses=df.filter(r=>r.pnl<0);
    const profSum=Math.round(wins.reduce((s,r)=>s+r.pnl,0)*100)/100;
    const lossSum=Math.round(losses.reduce((s,r)=>s+r.pnl,0)*100)/100;
    const aw=wins.length?(wins.reduce((s,r)=>s+r.pnl,0)/wins.length).toFixed(3):"0";
    const al=losses.length?(losses.reduce((s,r)=>s+r.pnl,0)/losses.length).toFixed(3):"0";
    const best=Math.max(...df.map(r=>r.pnl||0)).toFixed(3);
    const worst=Math.min(...df.map(r=>r.pnl||0)).toFixed(3);
    const fee=df.reduce((s,r)=>s+(r.fee||0),0).toFixed(3);
    const roi=((bal-SEED)/SEED*100).toFixed(1);
    const p24_=p24h(df).toFixed(2);
    const ep=avgOf(df,"entry_prob"), xp=avgOf(df,"exit_prob"), bp=avgOf(df,"best_prob");
    const mom=avgOf(df,"momentum"), vel=avgOf(df,"avg_velocity"), vlt=avgOf(df,"volatility");
    const reqSpd=avgOf(df,"required_speed");
    // Prices
    const sp_last = df[0].start_price!==undefined ? "$"+df[0].start_price.toFixed(2) : "—";
    const ep_last = df[0].end_price!==undefined   ? "$"+df[0].end_price.toFixed(2) : "—";
    const sp_avg  = df[0].start_price!==undefined ? "$"+(df.reduce((s,r)=>s+(r.start_price||0),0)/nn).toFixed(2) : "—";
    const ep_avg  = df[0].end_price!==undefined   ? "$"+(df.reduce((s,r)=>s+(r.end_price||0),0)/nn).toFixed(2) : "—";
    const dist_last= df[0].dist!==undefined ? (df[0].dist>=0?"+":"")+df[0].dist.toFixed(2)+"$" : "—";
    const dist_avg = df[0].dist!==undefined ? ((df.reduce((s,r)=>s+(r.dist||0),0)/nn)>=0?"+":"")+(df.reduce((s,r)=>s+(r.dist||0),0)/nn).toFixed(2)+"$" : "—";
    const tl_avg   = df[0].time_left!==undefined ? (df.reduce((s,r)=>s+(r.time_left||0),0)/nn).toFixed(0)+"s" : "—";
    // Zones
    const spike=zoneStats(df,"SPIKE"), gold=zoneStats(df,"GOLD"), lock=zoneStats(df,"LOCK");
    // Exits
    const e_tgt=exCount(df,"TARGET")+exCount(df,"TAKE");
    const e_trl=exCount(df,"TRAIL");
    const e_stp=exCount(df,"STOP");
    const e_rev=exCount(df,"REVERS");
    const e_end=exCount(df,"END");
    const e_saf=exCount(df,"SAFETY");
    const wrC=parseFloat(wr)>=60?"g":parseFloat(wr)>=50?"y":"r";
    const acC=cls==="test"?"a":cls==="test1"?"c":"p";
    // HIDE from table
    const HIDE=new Set(["_bot","_dt","pnl"]);
    const showCols=Object.keys(df[0]).filter(c=>!HIDE.has(c)&&!c.startsWith("_"));
    let tableRows="";
    df.slice(0,60).forEach(r=>{
      const res=String(r.result||"").toUpperCase();
      const rc=res==="WIN"?"r-win":res==="LOSS"?"r-loss":"";
      const tds=showCols.map(c=>`<td class="${tdClass(c,r[c],res)}">${r[c]!==undefined?r[c]:"—"}</td>`).join("");
      tableRows+=`<tr class="${rc}">${tds}</tr>`;
    });
    // mini chart IDs
    const bId=`mb_${cls}`, pId=`mp_${cls}`;
    const r16=parseInt(color.slice(1,3),16),g16=parseInt(color.slice(3,5),16),b16=parseInt(color.slice(5,7),16);
    const asc=[...df].reverse();

    el.innerHTML += `
    <div class="detail-card ${cls}">
      <div class="dc-header">
        <div class="dc-head-row">
          <div>
            <div class="dc-title" style="color:${color}">${icon} ${name}</div>
            <div class="dc-sub">SPIKE · GOLD · LOCK &nbsp;·&nbsp; ${nn} trades</div>
          </div>
          <div class="dc-bal-block">
            <div class="dc-bal-lbl">Balance</div>
            <div class="dc-bal-val">$${bal.toFixed(2)}</div>
            <div class="dc-bal-pnl ${pc(pnl)}">${ps(pnl)}${pnl}$ &nbsp;ROI ${ps(roi)}${roi}%</div>
            <div class="dc-24h ${pc(p24_)}">24h: ${ps(p24_)}${p24_}$</div>
          </div>
        </div>
      </div>

      <!-- KPIs -->
      <div class="kpi-grid">
        <div class="kpi"><div class="kpi-l">Trades</div><div class="kpi-v ${acC}">${nn}</div></div>
        <div class="kpi"><div class="kpi-l">Win%</div><div class="kpi-v ${wrC}">${wr}%</div></div>
        <div class="kpi"><div class="kpi-l">W/L</div><div class="kpi-v">${w}/${l}</div></div>
        <div class="kpi"><div class="kpi-l">Avg Win</div><div class="kpi-v g">+$${aw}</div></div>
        <div class="kpi"><div class="kpi-l">Avg Loss</div><div class="kpi-v r">$${al}</div></div>
        <div class="kpi"><div class="kpi-l">Best</div><div class="kpi-v g">+$${best}</div></div>
        <div class="kpi"><div class="kpi-l">Worst</div><div class="kpi-v r">$${worst}</div></div>
        <div class="kpi"><div class="kpi-l">Profit</div><div class="kpi-v g">+$${profSum}</div></div>
        <div class="kpi"><div class="kpi-l">Loss</div><div class="kpi-v r">$${lossSum}</div></div>
        <div class="kpi"><div class="kpi-l">Fee</div><div class="kpi-v y">$${fee}</div></div>
        <div class="kpi"><div class="kpi-l">ROI</div><div class="kpi-v ${parseFloat(roi)>=0?"g":"r"}">${ps(roi)}${roi}%</div></div>
        <div class="kpi"><div class="kpi-l">24h P&L</div><div class="kpi-v ${parseFloat(p24_)>=0?"g":"r"}">${ps(p24_)}${p24_}$</div></div>
        <div class="kpi"><div class="kpi-l">Entry Prob</div><div class="kpi-v y">${ep}</div></div>
        <div class="kpi"><div class="kpi-l">Exit Prob</div><div class="kpi-v">${xp}</div></div>
        <div class="kpi"><div class="kpi-l">Best Prob</div><div class="kpi-v g">${bp}</div></div>
        <div class="kpi"><div class="kpi-l">Momentum</div><div class="kpi-v b">${mom}</div></div>
        <div class="kpi"><div class="kpi-l">Velocity</div><div class="kpi-v y">${vel}</div></div>
        <div class="kpi"><div class="kpi-l">Volatility</div><div class="kpi-v">${vlt}</div></div>
      </div>

      <!-- PRICES -->
      <div class="price-row">
        <div class="price-box">
          <div class="price-box-l">Start Price (ultim)</div>
          <div class="price-box-v" style="color:var(--cyan)">${sp_last}</div>
        </div>
        <div class="price-box">
          <div class="price-box-l">End Price (ultim)</div>
          <div class="price-box-v" style="color:var(--purple)">${ep_last}</div>
        </div>
        <div class="price-box">
          <div class="price-box-l">Dist (ultim)</div>
          <div class="price-box-v" style="color:${df[0].dist!==undefined&&df[0].dist>=0?"var(--amber)":"var(--red2)"}">${dist_last}</div>
        </div>
        <div class="price-box">
          <div class="price-box-l">Start Price (avg)</div>
          <div class="price-box-v" style="color:var(--cyan)">${sp_avg}</div>
        </div>
        <div class="price-box">
          <div class="price-box-l">End Price (avg)</div>
          <div class="price-box-v" style="color:var(--purple)">${ep_avg}</div>
        </div>
        <div class="price-box">
          <div class="price-box-l">Dist avg &amp; Time Left avg</div>
          <div class="price-box-v" style="color:var(--amber);font-size:.7rem">${dist_avg} &nbsp;·&nbsp; <span style="color:var(--gold)">${tl_avg}</span></div>
        </div>
      </div>

      <!-- ZONES -->
      <div class="zone-row">
        <div class="zone-pill spike">
          <div class="zone-name">⚡ SPIKE</div>
          <div class="z-stats">
            <div class="zs"><div class="zs-l">T</div><div class="zs-v">${spike.t}</div></div>
            <div class="zs"><div class="zs-l">W%</div><div class="zs-v">${spike.wr}%</div></div>
            <div class="zs"><div class="zs-l">P&L</div><div class="zs-v" style="color:${spike.pnl>=0?"#4ade80":"#f87171"}">${ps(spike.pnl)}${spike.pnl}$</div></div>
          </div>
        </div>
        <div class="zone-pill goldz">
          <div class="zone-name">🥇 GOLD</div>
          <div class="z-stats">
            <div class="zs"><div class="zs-l">T</div><div class="zs-v">${gold.t}</div></div>
            <div class="zs"><div class="zs-l">W%</div><div class="zs-v">${gold.wr}%</div></div>
            <div class="zs"><div class="zs-l">P&L</div><div class="zs-v" style="color:${gold.pnl>=0?"#4ade80":"#f87171"}">${ps(gold.pnl)}${gold.pnl}$</div></div>
          </div>
        </div>
        <div class="zone-pill lockz">
          <div class="zone-name">🔒 LOCK</div>
          <div class="z-stats">
            <div class="zs"><div class="zs-l">T</div><div class="zs-v">${lock.t}</div></div>
            <div class="zs"><div class="zs-l">W%</div><div class="zs-v">${lock.wr}%</div></div>
            <div class="zs"><div class="zs-l">P&L</div><div class="zs-v" style="color:${lock.pnl>=0?"#4ade80":"#f87171"}">${ps(lock.pnl)}${lock.pnl}$</div></div>
          </div>
        </div>
      </div>

      <!-- EXITS -->
      <div class="exit-row">
        <div class="exit-pill"><div class="exit-icon">✅</div><div class="exit-lbl">TARGET/TP</div><div class="exit-val g">${e_tgt}</div></div>
        <div class="exit-pill"><div class="exit-icon">🔄</div><div class="exit-lbl">TRAIL</div><div class="exit-val g">${e_trl}</div></div>
        <div class="exit-pill"><div class="exit-icon">🛑</div><div class="exit-lbl">STOPLOSS</div><div class="exit-val r">${e_stp}</div></div>
        <div class="exit-pill"><div class="exit-icon">⚠️</div><div class="exit-lbl">REVERSAL</div><div class="exit-val y">${e_rev}</div></div>
        <div class="exit-pill"><div class="exit-icon">🔚</div><div class="exit-lbl">ENDROUND</div><div class="exit-val c">${e_end}</div></div>
        <div class="exit-pill" style="grid-column:span 1"><div class="exit-icon">🛡️</div><div class="exit-lbl">SAFETY</div><div class="exit-val b" style="color:var(--blue)">${e_saf}</div></div>
      </div>

      <!-- MINI CHARTS -->
      <div class="mini-chart-wrap">
        <div class="mini-chart-lbl">${name} · Balance Curve</div>
        <canvas id="${bId}" height="75"></canvas>
      </div>
      <div class="mini-chart-wrap">
        <div class="mini-chart-lbl">${name} · P&L per Trade</div>
        <canvas id="${pId}" height="75"></canvas>
      </div>

      <!-- TABLE -->
      <div class="tbl-header">
        <div class="tbl-title">📋 ${name} — Trade History</div>
        <div class="tbl-badge">${nn} trades</div>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr>${showCols.map(c=>`<th>${c.toUpperCase()}</th>`).join("")}</tr></thead>
          <tbody>${tableRows}</tbody>
        </table>
      </div>
    </div>`;

    // mini charts
    setTimeout(() => {
      const mini = {
        responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{
          x:{display:false,grid:{color:"rgba(17,29,53,.6)"}},
          y:{grid:{color:"rgba(17,29,53,.6)"},ticks:{color:"#2a3f60",font:{family:"DM Mono",size:7}}}
        }
      };
      const bEl=document.getElementById(bId), pEl=document.getElementById(pId);
      if(bEl){
        if(charts[bId])charts[bId].destroy();
        charts[bId]=new Chart(bEl,{type:"line",data:{labels:asc.map((_,i)=>i+1),datasets:[{
          data:asc.map(r=>r.balance),borderColor:color,
          backgroundColor:`rgba(${r16},${g16},${b16},.08)`,
          fill:true,tension:.35,pointRadius:0,borderWidth:2
        }]},options:{...mini}});
      }
      if(pEl){
        if(charts[pId])charts[pId].destroy();
        charts[pId]=new Chart(pEl,{type:"bar",data:{labels:asc.map((_,i)=>i+1),datasets:[{
          data:asc.map(r=>r.pnl||0),
          backgroundColor:asc.map(r=>(r.pnl||0)>=0?"#22c55e88":"#ef444488"),
          borderWidth:0,borderRadius:2
        }]},options:{...mini}});
      }
    }, 80);
  }
}

/* ── INIT ── */
setInterval(updateTimer, 1000); updateTimer();
update();
setInterval(update, 3000);
</script>
</body>
</html>
