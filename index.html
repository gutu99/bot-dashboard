<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bot CSV Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #08111f;
      color: #e5edf7;
      font-family: Arial, sans-serif;
    }
    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 {
      text-align: center;
      margin: 0 0 8px;
      font-size: 34px;
    }
    .sub {
      text-align: center;
      color: #8aa0bd;
      margin-bottom: 20px;
    }
    .filters {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .filters button {
      background: #122033;
      color: #dce8f7;
      border: 1px solid #233954;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
    }
    .filters button.active {
      background: #1d3557;
      border-color: #4ea1ff;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .card {
      background: #0e1a2b;
      border: 1px solid #1f344d;
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }
    .card h2 {
      margin: 0 0 12px;
      font-size: 20px;
    }
    .big {
      font-size: 32px;
      font-weight: 700;
      margin: 8px 0;
    }
    .green { color: #4ade80; }
    .red { color: #f87171; }
    .muted { color: #8aa0bd; }
    .stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 12px;
    }
    .stat {
      background: #0b1523;
      border: 1px solid #1a2c42;
      border-radius: 12px;
      padding: 10px;
      text-align: center;
    }
    .stat .label {
      font-size: 12px;
      color: #8aa0bd;
      margin-bottom: 4px;
    }
    .stat .value {
      font-size: 20px;
      font-weight: 700;
    }
    .charts {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    .chart-card {
      background: #0e1a2b;
      border: 1px solid #1f344d;
      border-radius: 16px;
      padding: 16px;
    }
    .chart-wrap {
      height: 320px;
    }
    .table-card {
      background: #0e1a2b;
      border: 1px solid #1f344d;
      border-radius: 16px;
      padding: 16px;
      overflow-x: auto;
    }
    table {
      width: 100%;
      min-width: 900px;
      border-collapse: collapse;
    }
    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid #1a2c42;
      text-align: center;
      font-size: 13px;
    }
    th {
      color: #9ab2cf;
      background: #0b1523;
      position: sticky;
      top: 0;
    }
    .pill {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }
    .pill-win {
      background: rgba(74, 222, 128, 0.15);
      color: #4ade80;
    }
    .pill-loss {
      background: rgba(248, 113, 113, 0.15);
      color: #f87171;
    }
    .row-win { background: rgba(74, 222, 128, 0.04); }
    .row-loss { background: rgba(248, 113, 113, 0.04); }
    .recent-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }
    .recent {
      background: #0e1a2b;
      border: 1px solid #1f344d;
      border-radius: 14px;
      padding: 12px;
    }
    .recent .top {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      gap: 8px;
    }
    .recent .bot {
      font-weight: 700;
    }
    .recent .pnl {
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Bot CSV Dashboard</h1>
    <div class="sub">Compatibil direct cu CSV-ul tău: pnl_net, result, exit_type, entry_prob, exit_prob</div>

    <div class="filters">
      <button class="filter-btn active" data-filter="ALL">ALL</button>
      <button class="filter-btn" data-filter="24H">LAST 24H</button>
      <button class="filter-btn" data-filter="TODAY">TODAY</button>
    </div>

    <div id="summaryGrid" class="grid"></div>

    <div class="chart-card">
      <h2>Balance Curve</h2>
      <div class="chart-wrap">
        <canvas id="balanceChart"></canvas>
      </div>
    </div>

    <div style="height:16px"></div>

    <div class="chart-card">
      <h2>Net PnL per Trade</h2>
      <div class="chart-wrap">
        <canvas id="pnlChart"></canvas>
      </div>
    </div>

    <div style="height:24px"></div>

    <h2>Recent Trades</h2>
    <div id="recentTrades" class="recent-grid"></div>

    <div style="height:24px"></div>

    <div class="table-card">
      <h2>All Trades</h2>
      <table>
        <thead>
          <tr>
            <th>Bot</th>
            <th>Date</th>
            <th>Time</th>
            <th>Side</th>
            <th>Amount</th>
            <th>Entry</th>
            <th>Exit</th>
            <th>Exit Type</th>
            <th>Fee</th>
            <th>Net PnL</th>
            <th>Result</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="tradesTableBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    // Pune aici fișierele tale reale
    const FILES = {
      Test1: "https://raw.githubusercontent.com/gutu99/bot-dashboard/main/Test123.csv",
      Test15: "https://raw.githubusercontent.com/gutu99/bot-dashboard/main/Test555.csv"
    };

    // Dacă vrei balanță reală, pune valorile de start aici.
    // Dacă nu, lasă 0 și dashboardul va arăta curba PnL pornind de la zero.
    const START_BALANCE = {
      Test1: 0,
      Test15: 0
    };

    const COLORS = {
      Test1: "#06b6d4",
      Test15: "#f59e0b"
    };

    let RAW_DATA = {};
    let currentFilter = "ALL";
    let balanceChart = null;
    let pnlChart = null;

    function toNum(v) {
      if (v == null) return null;
      const s = String(v).trim().replace(",", ".");
      if (s === "") return null;
      const n = Number(s);
      return Number.isFinite(n) ? n : null;
    }

    function parseCSV(text, botName) {
      const lines = text.trim().split(/\r?\n/).filter(Boolean);
      if (lines.length < 2) return [];

      const headers = lines[0].split(",").map(h => h.trim().toLowerCase());

      const rows = lines.slice(1).map(line => {
        const parts = line.split(",");
        const row = {};
        headers.forEach((h, i) => {
          row[h] = (parts[i] ?? "").trim();
        });

        row.bot = botName;
        row.amount = toNum(row.amount) ?? 0;
        row.entry_prob = toNum(row.entry_prob);
        row.exit_prob = toNum(row.exit_prob);
        row.pnl_gross = toNum(row.pnl_gross) ?? 0;
        row.fee = toNum(row.fee) ?? 0;
        row.pnl_net = toNum(row.pnl_net) ?? 0;

        row.result = String(row.result || "").toUpperCase();
        row.exit_type = String(row.exit_type || "").toUpperCase();
        row.status = String(row.status || "");

        row._dt = new Date(`${row.date}T${row.time}`);
        row._dateFmt = row.date || "—";
        row._timeFmt = row.time ? row.time.slice(0, 5) : "—";

        return row;
      });

      rows.sort((a, b) => a._dt - b._dt);

      let balance = START_BALANCE[botName] ?? 0;
      for (const row of rows) {
        balance += row.pnl_net;
        row.balance = Number(balance.toFixed(4));
      }

      return rows;
    }

    function filterRows(rows, filterName) {
      if (filterName === "ALL") return [...rows];

      const now = new Date();
      let cutoff;

      if (filterName === "24H") {
        cutoff = new Date(now.getTime() - 24 * 60 * 60 * 1000);
      } else {
        cutoff = new Date();
        cutoff.setHours(0, 0, 0, 0);
      }

      return rows.filter(r => r._dt >= cutoff);
    }

    function getFilteredData() {
      const out = {};
      for (const [bot, rows] of Object.entries(RAW_DATA)) {
        out[bot] = filterRows(rows, currentFilter);
      }
      return out;
    }

    function flattenData(datasets) {
      return Object.values(datasets).flat().sort((a, b) => b._dt - a._dt);
    }

    function sum(arr, key) {
      return arr.reduce((s, x) => s + (Number(x[key]) || 0), 0);
    }

    function avg(arr, key) {
      const vals = arr.map(x => x[key]).filter(v => typeof v === "number" && !Number.isNaN(v));
      if (!vals.length) return 0;
      return vals.reduce((a, b) => a + b, 0) / vals.length;
    }

    function pct(n) {
      return `${n.toFixed(1)}%`;
    }

    function renderSummary(datasets) {
      const el = document.getElementById("summaryGrid");
      let html = "";

      for (const [bot, rows] of Object.entries(datasets)) {
        const totalTrades = rows.length;
        const wins = rows.filter(r => r.result === "WIN").length;
        const losses = rows.filter(r => r.result === "LOSS").length;
        const net = sum(rows, "pnl_net");
        const fees = sum(rows, "fee");
        const winrate = totalTrades ? (wins / totalTrades) * 100 : 0;
        const avgEntry = avg(rows, "entry_prob");
        const avgExit = avg(rows, "exit_prob");
        const lastBalance = rows.length ? rows[rows.length - 1].balance : (START_BALANCE[bot] ?? 0);

        html += `
          <div class="card">
            <h2 style="color:${COLORS[bot] || '#fff'}">${bot}</h2>
            <div class="big ${net >= 0 ? "green" : "red"}">${net >= 0 ? "+" : ""}${net.toFixed(4)}$</div>
            <div class="muted">Balance: ${lastBalance.toFixed(4)}$</div>

            <div class="stats">
              <div class="stat">
                <div class="label">TRADES</div>
                <div class="value">${totalTrades}</div>
              </div>
              <div class="stat">
                <div class="label">WINRATE</div>
                <div class="value">${pct(winrate)}</div>
              </div>
              <div class="stat">
                <div class="label">WINS / LOSSES</div>
                <div class="value">${wins} / ${losses}</div>
              </div>
              <div class="stat">
                <div class="label">FEES</div>
                <div class="value">${fees.toFixed(4)}$</div>
              </div>
              <div class="stat">
                <div class="label">AVG ENTRY</div>
                <div class="value">${avgEntry ? avgEntry.toFixed(4) : "—"}</div>
              </div>
              <div class="stat">
                <div class="label">AVG EXIT</div>
                <div class="value">${avgExit ? avgExit.toFixed(4) : "—"}</div>
              </div>
            </div>
          </div>
        `;
      }

      el.innerHTML = html;
    }

    function renderRecent(datasets) {
      const allRows = flattenData(datasets).slice(0, 10);
      const el = document.getElementById("recentTrades");

      if (!allRows.length) {
        el.innerHTML = `<div class="muted">Nu există date pentru filtrul selectat.</div>`;
        return;
      }

      el.innerHTML = allRows.map(r => `
        <div class="recent">
          <div class="top">
            <div class="bot" style="color:${COLORS[r.bot] || '#fff'}">${r.bot}</div>
            <div class="pnl ${r.pnl_net >= 0 ? 'green' : 'red'}">${r.pnl_net >= 0 ? '+' : ''}${r.pnl_net.toFixed(4)}$</div>
          </div>
          <div class="muted">${r._dateFmt} ${r._timeFmt}</div>
          <div>Side: <b>${r.side || '—'}</b></div>
          <div>Entry → Exit: <b>${r.entry_prob ?? '—'}</b> → <b>${r.exit_prob ?? '—'}</b></div>
          <div>Type: <b>${r.exit_type || '—'}</b></div>
          <div style="margin-top:8px">
            <span class="pill ${r.result === 'WIN' ? 'pill-win' : 'pill-loss'}">${r.result || '—'}</span>
          </div>
        </div>
      `).join("");
    }

    function renderTable(datasets) {
      const rows = flattenData(datasets);
      const body = document.getElementById("tradesTableBody");

      body.innerHTML = rows.map(r => `
        <tr class="${r.result === 'WIN' ? 'row-win' : 'row-loss'}">
          <td style="color:${COLORS[r.bot] || '#fff'};font-weight:700">${r.bot}</td>
          <td>${r._dateFmt}</td>
          <td>${r._timeFmt}</td>
          <td>${r.side || '—'}</td>
          <td>${r.amount.toFixed(4)}</td>
          <td>${r.entry_prob ?? '—'}</td>
          <td>${r.exit_prob ?? '—'}</td>
          <td>${r.exit_type || '—'}</td>
          <td>${r.fee.toFixed(4)}</td>
          <td class="${r.pnl_net >= 0 ? 'green' : 'red'}">${r.pnl_net >= 0 ? '+' : ''}${r.pnl_net.toFixed(4)}$</td>
          <td>
            <span class="pill ${r.result === 'WIN' ? 'pill-win' : 'pill-loss'}">${r.result || '—'}</span>
          </td>
          <td>${r.status || '—'}</td>
        </tr>
      `).join("");
    }

    function drawBalanceChart(datasets) {
      const ctx = document.getElementById("balanceChart").getContext("2d");
      if (balanceChart) balanceChart.destroy();

      const ds = Object.entries(datasets).map(([bot, rows]) => ({
        label: bot,
        data: rows.map(r => ({ x: r._dt, y: r.balance })),
        borderColor: COLORS[bot] || "#fff",
        backgroundColor: COLORS[bot] || "#fff",
        tension: 0.2
      }));

      balanceChart = new Chart(ctx, {
        type: "line",
        data: { datasets: ds },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          parsing: false,
          scales: {
            x: {
              type: "time",
              time: { tooltipFormat: "yyyy-MM-dd HH:mm:ss" },
              ticks: { color: "#9ab2cf" },
              grid: { color: "#1a2c42" }
            },
            y: {
              ticks: { color: "#9ab2cf" },
              grid: { color: "#1a2c42" }
            }
          },
          plugins: {
            legend: { labels: { color: "#dce8f7" } }
          }
        }
      });
    }

    function drawPnlChart(datasets) {
      const ctx = document.getElementById("pnlChart").getContext("2d");
      if (pnlChart) pnlChart.destroy();

      const rows = flattenData(datasets).reverse();
      const labels = rows.map(r => `${r.bot} ${r._timeFmt}`);
      const values = rows.map(r => r.pnl_net);

      pnlChart = new Chart(ctx, {
        type: "bar",
        data: {
          labels,
          datasets: [{
            label: "Net PnL",
            data: values
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { labels: { color: "#dce8f7" } }
          },
          scales: {
            x: {
              ticks: { color: "#9ab2cf" },
              grid: { color: "#1a2c42" }
            },
            y: {
              ticks: { color: "#9ab2cf" },
              grid: { color: "#1a2c42" }
            }
          }
        }
      });
    }

    function updateUI() {
      const filtered = getFilteredData();
      renderSummary(filtered);
      renderRecent(filtered);
      renderTable(filtered);
      drawBalanceChart(filtered);
      drawPnlChart(filtered);
    }

    async function fetchAll() {
      const nextData = {};

      for (const [bot, url] of Object.entries(FILES)) {
        try {
          const res = await fetch(`${url}?t=${Date.now()}`, { cache: "no-store" });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const text = await res.text();
          nextData[bot] = parseCSV(text, bot);
        } catch (err) {
          console.error(`Eroare la ${bot}:`, err);
          nextData[bot] = [];
        }
      }

      RAW_DATA = nextData;
      updateUI();
    }

    document.querySelectorAll(".filter-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentFilter = btn.dataset.filter;
        updateUI();
      });
    });

    fetchAll();
    setInterval(fetchAll, 15000);
  </script>

  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
</body>
</html>
